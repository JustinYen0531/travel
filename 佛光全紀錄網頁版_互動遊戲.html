<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>佛光山探險：視覺小說冒險（完全版）</title>
    <style>
        :root {
            --textbox-bg: rgba(28, 16, 12, 0.95);
            --option-bg: linear-gradient(180deg, #d4a76a 0%, #8b5a2b 100%);
            --option-border: #f3e5ab;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: pointer; user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: black; font-family: "Noto Sans TC", sans-serif; }

        #game-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            transition: opacity 1.2s ease-in-out;
            z-index: 1;
        }

        .vignette {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            box-shadow: inset 0 0 200px rgba(0,0,0,0.9);
            z-index: 2;
            pointer-events: none;
        }

        #choice-dim {
            position: fixed;
            inset: 0;
            background: rgba(82, 84, 88, 0.38);
            backdrop-filter: blur(1.8px) saturate(0.75);
            z-index: 8;
            display: none;
            pointer-events: none;
        }

        #scene-image-wrap {
            position: fixed;
            left: 50%;
            top: 16px;
            transform: translateX(-50%);
            width: auto;
            max-width: min(84vw, 980px);
            display: none;
            justify-content: center;
            z-index: 9;
            pointer-events: none;
        }

        #scene-image-wrap::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(88, 90, 94, 0.34);
            border-radius: 14px;
            opacity: 0;
            transition: opacity 0.2s ease;
            pointer-events: none;
        }

        #scene-image-wrap.choice-active::after {
            opacity: 1;
        }

        #scene-image {
            display: block;
            width: auto;
            max-width: min(82vw, 940px);
            max-height: calc(100vh - 330px);
            object-fit: contain;
            border-radius: 14px;
            border: 3px solid rgba(243, 229, 171, 0.75);
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.55);
            background: rgba(18, 19, 16, 0.72);
            padding: 10px;
        }

        #text-box-container {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 1100px;
            z-index: 10;
        }

        #text-box {
            background: var(--textbox-bg);
            border: 3px solid #8b5a2b;
            border-radius: 12px;
            padding: 30px 50px;
            min-height: 220px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            position: relative;
        }

        #speaker-name {
            position: absolute;
            top: -25px;
            left: 40px;
            background: #8b5a2b;
            padding: 8px 35px;
            border-radius: 4px;
            color: #f3e5ab;
            font-weight: bold;
            font-size: 1.2rem;
            border: 1px solid #f3e5ab;
        }

        #dialogue-text {
            color: #f3e5ab;
            font-size: 1.45rem;
            line-height: 1.7;
            margin-top: 15px;
            text-align: justify;
        }

        #next-indicator {
            position: absolute;
            bottom: 20px;
            right: 30px;
            color: #f3e5ab;
            animation: bounce 0.8s infinite alternate;
            font-size: 1.5rem;
        }

        #options-container {
            position: fixed;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            display: none;
            flex-direction: column;
            gap: 20px;
            width: 500px;
        }

        .option-btn {
            background: var(--option-bg);
            border: 2px solid var(--option-border);
            border-radius: 8px;
            padding: 18px 30px;
            color: #2c1810;
            font-weight: 800;
            font-size: 1.4rem;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            transition: all 0.2s;
        }

        .option-btn:hover {
            transform: scale(1.04);
            filter: brightness(1.15);
        }

        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(8px); } }

        #start-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            transition: opacity 1s;
        }

        .start-btn {
            margin-top: 40px;
            padding: 15px 70px;
            background: transparent;
            border: 2px solid white;
            color: white;
            font-size: 1.8rem;
            border-radius: 50px;
            transition: all 0.3s;
        }
        .start-btn:hover { background: white; color: black; }

        #progress {
            position: fixed;
            top: 20px; right: 40px;
            color: rgba(243, 229, 171, 0.6);
            font-size: 1rem;
            z-index: 30;
        }
    </style>
</head>
<body>
    <div id="progress">冒險進度：1 / 10</div>
    <div id="start-overlay">
        <h1 style="font-size: 3.5rem; text-shadow: 0 0 25px #818cf8;">佛光山：末日校園流浪</h1>
        <button class="start-btn" onclick="startGame()">點擊開始冒險</button>
    </div>

    <div id="game-bg"></div>
    <div class="vignette"></div>
    <div id="choice-dim"></div>
    <div id="scene-image-wrap">
        <img id="scene-image" alt="劇情圖片">
    </div>

    <div id="options-container"></div>

    <div id="text-box-container" onclick="nextAction()">
        <div id="text-box">
            <div id="speaker-name">主角</div>
            <div id="dialogue-text">正在回溯那段具備探險價值的記憶...</div>
            <div id="next-indicator">▼</div>
        </div>
    </div>

    <script>
        const scenario = [
            { bg: 'web-images/IMG_0655.jpg', image: 'web-images/IMG_0649.jpg', speaker: '旁白', text: '老師說，旅行的第一步是設定目標。我的目標其實很模糊，卻也很真誠：追隨隨機性，並且嘗試與陌生人交流。那天下午，我本來只打算去臺北象山。', next: 1 },
            { bg: 'web-images/IMG_0655.jpg', image: 'web-images/IMG_0650.jpg', speaker: '我', text: '可就在出門前，我發現自己忘了塗防曬；再加上象山每年至少爬一次，早就失去新鮮感。我決定去一個這輩子可能再也去不到的地，佛光大學的名字浮現在腦海中。', next: 2 },
            { 
                bg: 'web-images/IMG_0655.jpg', image: 'web-images/IMG_0665.jpg', speaker: '抉擇', text: '第一題：目的地選擇', 
                options: [
                    { title: '打道回府避暑', next: 'END_HOME' },
                    { title: '前往佛光大學 (宜蘭)', next: 3 }
                ]
            },
            { bg: 'web-images/IMG_0653.jpg', image: 'web-images/IMG_0661.jpg', speaker: '我', text: '這是一場外縣市的處女秀。AI 建議我前往佛大，因為搭臺鐵速度較快。血液開始沸騰，這是一場具備探險價值的隨興決定。', next: 4 },
            { 
                bg: 'web-images/IMG_0653.jpg', image: 'web-images/IMG_0657.jpg', speaker: '抉擇', text: '第二題：心態調整', 
                options: [
                    { title: '堅持熱血衝一波', next: 5 },
                    { title: '買個防曬再走', next: 5 }
                ]
            },
            { bg: 'web-images/IMG_0653.jpg', image: 'web-images/IMG_0663.jpg', speaker: '臺鐵', text: '下午三點半的火車，有一種舒適的寬敞感。看著窗外地景演化成田野，我不斷體察著地景的脈動。', next: 6 },
            { bg: 'web-images/IMG_0653.jpg', image: 'web-images/IMG_0664.jpg', speaker: '意外', text: '糟了！我不小心坐過頭，醒來已經是在宜蘭站。我只好補了十一元票差，感覺這就是所謂的 Serendipity 吧？', next: 7 },
            { 
                bg: 'web-images/IMG_0653.jpg', image: 'web-images/IMG_0666.jpg', speaker: '抉擇', text: '第三題：路上的波折', 
                options: [
                    { title: '將錯就錯下車', next: 8 },
                    { title: '沮喪地坐回去', next: 'END_BACK' }
                ]
            },
            { bg: 'web-images/IMG_0664.jpg', image: 'web-images/IMG_0667.jpg', speaker: '計程車', text: '從宜蘭站出來，我搭上了一輛計程車。後座坐著司機剛下班的兒子。這成了這趟旅程第一個真正的人際接觸。', next: 9 },
            { 
                bg: 'web-images/IMG_0664.jpg', image: 'web-images/IMG_0669.jpg', speaker: '抉擇', text: '第四題：人際交流', 
                options: [
                    { title: '婉拒餐盒 (期待校內餐廳)', next: 10 },
                    { title: '欣然接受溫暖', next: 10 }
                ]
            },
            { bg: 'web-images/IMG_0671.jpg', image: 'web-images/IMG_0670.jpg', speaker: '雲起樓', text: '抵達山頂行政大樓「雲起樓」時，已是傍晚六點。大樓內部昏暗，走馬燈閃動著疫情情資，一股末日般的詭譎感席捲而來。', next: 11 },
            { 
                bg: 'web-images/IMG_0671.jpg', image: 'web-images/IMG_0671.jpg', speaker: '抉擇', text: '第五題：校園探險', 
                options: [
                    { title: '深入禁區探索', next: 12 },
                    { title: '留在萊爾富周邊', next: 12 }
                ]
            },
            { bg: 'web-images/IMG_0674.jpg', speaker: '生存', text: '全校學生不到五位。萊爾富沒有餐具，我蹲在走廊邊以碗就口、直接把微熱的飯粒倒進嘴裡。這是我人生最有滋味的一餐。', next: 13 },
            { 
                bg: 'web-images/IMG_0674.jpg', image: 'web-images/IMG_0680.jpg', speaker: '抉擇', text: '第六題：生存方式', 
                options: [
                    { title: '以碗就口倒進嘴裡', next: 14 },
                    { title: '優雅地用手抓', next: 14 }
                ]
            },
            { bg: 'web-images/IMG_0675.jpg', image: 'web-images/IMG_0679.jpg', speaker: '下山驚魂', text: '晚上八點。叫不到車。路過陰森破舊的「蔬菜學系」大樓，我的意志力幾乎快要崩潰。母親的查勤電話接二連三地打進來。', next: 15 },
            { 
                bg: 'web-images/IMG_0675.jpg', image: 'web-images/IMG_0684.jpg', speaker: '抉擇', text: '第七題：意志與恐懼', 
                options: [
                    { title: '靠意志力繼續走', next: 16 },
                    { title: '停下來哭泣', next: 16 }
                ]
            },
            { bg: 'web-images/IMG_0681.jpg', speaker: '警衛室', text: '到了警衛室，最後一班校車已走。我握緊手中的一千元與手機，再次對著車行發出救命訊號。', next: 17 },
            { 
                bg: 'web-images/IMG_0687.jpg', image: 'IMG_0695.PNG', speaker: '抉擇', text: '第八題：告求', 
                options: [
                    { title: '瞞著媽媽假裝安全', next: 18 },
                    { title: '誠實求援', next: 18 }
                ]
            },
            { bg: 'web-images/IMG_0703.jpg', speaker: '救命燈火', text: '等了二十分鐘，那道計程車的燈光像救贖般出現。21:44 我終於登上了自強號，準備回歸那繁忙的水泥森林。', next: 19 },
            { 
                bg: 'web-images/IMG_0703.jpg', speaker: '抉擇', text: '第九題：總結原則', 
                options: [
                    { title: '不作功課但確保安全', next: 20 },
                    { title: '以後只爬象山', next: 20 }
                ]
            },
            { bg: 'web-images/IMG_0701.jpg', speaker: '終章', text: '午夜十二點踏入家門。這 9 小時的流浪讓我明白，真正的交流不在論壇，而在人心的溫暖與那段驚心動魄的撤退中。', next: 21 },
            { 
                bg: 'web-images/IMG_0701.jpg', image: 'web-images/IMG_0688.jpg', speaker: '抉擇', text: '第十題：旅程定調', 
                options: [
                    { title: '接受隨機與準備', next: 22 },
                    { title: '從此拒絕山區', next: 22 }
                ]
            },
            { bg: 'web-images/IMG_0703.jpg', speaker: '結語', text: '探險可以不帶攻略，但不能沒有基本安全意識。這是我這輩子最重要的一堂課。', next: 'END' }
        ];

        let currentIndex = 0;
        let isTyping = false;
        let qCount = 1;

        function startGame() {
            document.getElementById('start-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('start-overlay').style.display = 'none';
                updateFrame();
            }, 1000);
        }

        function updateFrame() {
            const current = scenario[currentIndex];
            const bg = document.getElementById('game-bg');
            const sceneImageWrap = document.getElementById('scene-image-wrap');
            const sceneImage = document.getElementById('scene-image');
            const choiceDim = document.getElementById('choice-dim');
            
            bg.style.backgroundImage = `url('${current.bg}')`;

            if (current.image) {
                sceneImage.src = current.image;
                sceneImageWrap.style.display = 'flex';
            } else {
                sceneImageWrap.style.display = 'none';
            }
            
            if(current.speaker === '抉擇') {
                document.getElementById('progress').innerText = `冒險抉擇點：${qCount} / 10`;
                qCount++;
            }
            
            document.getElementById('speaker-name').innerText = current.speaker;
            typeEffect(current.text);
            document.getElementById('options-container').style.display = 'none';
            choiceDim.style.display = 'none';
            sceneImageWrap.classList.remove('choice-active');
        }

        function typeEffect(text) {
            const dialog = document.getElementById('dialogue-text');
            dialog.innerText = '';
            isTyping = true;
            let i = 0;
            const timer = setInterval(() => {
                dialog.innerText += text[i];
                i++;
                if (i >= text.length) {
                    clearInterval(timer);
                    isTyping = false;
                    checkShowOptions();
                }
            }, 30);
        }

        function checkShowOptions() {
            const current = scenario[currentIndex];
            if (current.options) {
                const optContainer = document.getElementById('options-container');
                const choiceDim = document.getElementById('choice-dim');
                const sceneImageWrap = document.getElementById('scene-image-wrap');
                optContainer.innerHTML = '';
                current.options.forEach(opt => {
                    const btn = document.createElement('div');
                    btn.className = 'option-btn';
                    btn.innerText = opt.title;
                    btn.onclick = (e) => { e.stopPropagation(); handleOption(opt.next); };
                    optContainer.appendChild(btn);
                });
                choiceDim.style.display = 'block';
                sceneImageWrap.classList.add('choice-active');
                optContainer.style.display = 'flex';
                document.getElementById('next-indicator').style.display = 'none';
            } else {
                document.getElementById('next-indicator').style.display = 'block';
            }
        }

        function handleOption(nextId) {
            if (nextId === 'END_HOME') { alert('你回家了。冒險終止。'); location.reload(); return; }
            if (nextId === 'END_BACK') { alert('撤退成功。'); location.reload(); return; }
            currentIndex = nextId;
            updateFrame();
        }

        function nextAction() {
            if (isTyping) return;
            const current = scenario[currentIndex];
            if (current.options) return; 
            if (current.next === 'END') {
                alert('報告結束，完成意志力冒險！');
                location.reload();
            } else {
                currentIndex = current.next;
                updateFrame();
            }
        }
    </script>
</body>
</html>
