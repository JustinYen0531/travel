<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>佛光山探險：視覺小說冒險 (完整 10 題版)</title>
    <style>
        :root {
            --textbox-bg: rgba(28, 16, 12, 0.95);
            --option-bg: linear-gradient(180deg, #d4a76a 0%, #8b5a2b 100%);
            --option-border: #f3e5ab;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: pointer; user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: black; font-family: "Noto Sans TC", sans-serif; }

        #game-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            transition: opacity 1.2s ease-in-out;
            z-index: 1;
        }

        .vignette {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            box-shadow: inset 0 0 200px rgba(0,0,0,0.9);
            z-index: 2;
            pointer-events: none;
        }

        #text-box-container {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 1100px;
            z-index: 10;
            display: none;
        }

        #text-box {
            background: var(--textbox-bg);
            border: 3px solid #8b5a2b;
            border-radius: 12px;
            padding: 30px 50px;
            min-height: 220px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            position: relative;
        }

        #speaker-name {
            position: absolute;
            top: -25px;
            left: 40px;
            background: #8b5a2b;
            padding: 8px 35px;
            border-radius: 4px;
            color: #f3e5ab;
            font-weight: bold;
            font-size: 1.2rem;
            border: 1px solid #f3e5ab;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        #dialogue-text {
            color: #f3e5ab;
            font-size: 1.45rem;
            line-height: 1.7;
            margin-top: 15px;
            text-align: justify;
        }

        #next-indicator {
            position: absolute;
            bottom: 20px;
            right: 30px;
            color: #f3e5ab;
            animation: bounce 0.8s infinite alternate;
            font-size: 1.5rem;
        }

        #options-container {
            position: fixed;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            display: none;
            flex-direction: column;
            gap: 25px;
            width: 500px;
        }

        .option-btn {
            background: var(--option-bg);
            border: 2px solid var(--option-border);
            border-radius: 8px;
            padding: 20px 40px;
            color: #2c1810;
            font-weight: 800;
            font-size: 1.4rem;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            transition: all 0.2s;
        }

        .option-btn:hover {
            transform: scale(1.04);
            filter: brightness(1.15);
            box-shadow: 0 0 25px rgba(243, 229, 171, 0.4);
        }

        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(8px); } }

        #start-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #2d3748 0%, #000 100%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            transition: opacity 1.5s;
        }

        .start-btn {
            margin-top: 40px;
            padding: 20px 80px;
            background: rgba(255,255,255,0.1);
            border: 2px solid white;
            color: white;
            font-size: 1.8rem;
            border-radius: 60px;
            font-weight: bold;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .start-btn:hover { background: white; color: black; transform: scale(1.1); box-shadow: 0 0 30px white; }

        /* 進度指示器 */
        #progress {
            position: fixed;
            top: 20px; right: 40px;
            color: rgba(243, 229, 171, 0.6);
            font-size: 1rem;
            z-index: 30;
        }
    </style>
</head>
<body>
    <div id="progress">冒險進度：1 / 10</div>
    <div id="start-overlay">
        <h1 style="font-size: 4rem; letter-spacing: 5px; text-shadow: 0 0 25px #818cf8;">佛光山：末日流浪</h1>
        <p style="margin-top: 20px; font-size: 1.3rem; color: #a0aec0;">一個關於 9 小時意志力的探險紀錄遊戲</p>
        <button class="start-btn" onclick="startGame()">點擊開始冒險</button>
    </div>

    <div id="game-bg"></div>
    <div class="vignette"></div>

    <div id="options-container"></div>

    <div id="text-box-container" onclick="nextAction()">
        <div id="text-box">
            <div id="speaker-name">主角</div>
            <div id="dialogue-text">正在回溯那段具備探險價值的記憶...</div>
            <div id="next-indicator">▼</div>
        </div>
    </div>

    <script>
        const scenario = [
            /* Q1: 出發 */
            { bg: 'IMG_0695.PNG', speaker: '旁白', text: '那天下午，我原本只打算去象山，完成一場安全、熟悉、甚至有點無聊的例行散步。可就在出門前，我忽然發現自己忘了塗防曬，整個計畫像被按下暫停鍵，也像是在逼我承認自己其實早就對那條老路失去興趣。', next: 1 },
            { bg: 'IMG_0695.PNG', speaker: '我', text: '我站在門口想：如果今天還是去那條每年都會走一次的山路，這趟旅行大概什麼也不會留下。與其重複，不如乾脆追一個更陌生、更接近探險的地方，最好是那種現在不去，也許以後真的不會再去的地方。', next: 2 },
            { 
                bg: 'IMG_0695.PNG', speaker: '抉擇', text: '第一題：當熟悉的行程失去吸引力，我要把這一天導向哪裡？', 
                options: [
                    { title: '打道回府避暑', next: 'END_HOME' },
                    { title: '前往偏僻的佛光大學', next: 3 }
                ]
            },
            /* Q2: 防曬 */
            { bg: 'IMG_0653.HEIC', speaker: '我', text: 'AI 給了我兩個候選地點，而佛光大學一下就擊中了我。那是一所立在宜蘭山頭、可能因大環境而走向停辦的學校，光是名字就帶著一種快要消失的邊境感。', next: 4 },
            { 
                bg: 'IMG_0653.HEIC', speaker: '抉擇', text: '第二題：抵達臺北車站後，我還要不要為了防曬與舒適感多停一下？', 
                options: [
                    { title: '不管了，熱血衝一波', next: 5 },
                    { title: '去買個防曬再走', next: 5 }
                ]
            },
            /* Q3: 交通 */
            { bg: 'IMG_0653.HEIC', speaker: '臺鐵車廂', text: '下午三點半，我坐上臺鐵。車廂比我想像中舒服，像放大版的捷運，而窗外景色則一路從密集建築、工廠邊角，慢慢退成大片田野與更安靜的綠。', next: 6 },
            { bg: 'IMG_0653.HEIC', speaker: '我', text: '我一邊看風景，一邊試著在校園版上找有沒有陌生人願意吃飯聊天，卻只看到幾乎停擺的版面。手機放下後，火車的晃動把我推進睡意，下一段旅程從失誤開始接手。', next: 7 },
            /* Q4: 意外 */
            { bg: 'IMG_0653.HEIC', speaker: '我', text: '再睜開眼時，列車門外已經不是礁溪，而是宜蘭。我就這樣坐過頭，臨時補了十一元票差，站在月台上時只覺得這趟旅行忽然從規畫變成現場直播。', next: 8 },
            { 
                bg: 'IMG_0653.HEIC', speaker: '抉擇', text: '第三題：面對坐過站這種烏龍，我要把它當成失敗，還是當成 serendipity？', 
                options: [
                    { title: '將錯就錯下車（隨機性）', next: 9 },
                    { title: '沮喪地坐回礁溪', next: 'END_BACK' }
                ]
            },
            /* Q5: 父子對話 */
            { bg: 'IMG_0664.HEIC', speaker: '計程車', text: '走出宜蘭站後，我攔到一輛計程車，車上先坐著司機的兒子。山路開始變暗時，他很自然地問我今天是不是放假，為什麼這麼晚還要上山。', next: 10 },
            { bg: 'IMG_0664.HEIC', speaker: '我', text: '那一瞬間我非常尷尬，因為當天其實是政大校慶，我卻像個真正的佛光學生一樣坐在回山上的路上。比起硬撐，我最後還是坦白：我不是這裡的學生，只是來做探索作業。', next: 11 },
            { 
                bg: 'IMG_0664.HEIC', speaker: '抉擇', text: '第四題：坦白身分後，面對司機父子釋出的善意，我要怎麼回應？', 
                options: [
                    { title: '期待校園美食而婉拒', next: 12 },
                    { title: '欣然接受這份溫暖', next: 12 }
                ]
            },
            /* Q6: 末日校園 */
            { bg: 'IMG_0671.HEIC', speaker: '雲起樓', text: '抵達山頂後，最高的那棟建築被學生指認為雲起樓。我站在門口時只覺得眼前像夢核畫面成真，空間不是單純安靜，而是安靜到像被時間遺忘。', next: 13 },
            { bg: 'IMG_0671.HEIC', speaker: '我', text: '大廳昏黃，走馬燈還在播報疫情年代的防疫公告，整棟樓目測不到五個人。二三樓雖然開著，但那種空曠與回音讓我連走上去都需要先說服自己。', next: 14 },
            { 
                bg: 'IMG_0671.HEIC', speaker: '抉擇', text: '第五題：面對這座像末日場景的行政大樓，我要更深入，還是先留在相對安全的區域？', 
                options: [
                    { title: '深入二三樓探索', next: 15 },
                    { title: '留在萊爾富附近', next: 15 }
                ]
            },
            /* Q7: 生存晚餐 */
            { bg: 'IMG_0685.HEIC', speaker: '萊爾富', text: '我原本以為校園裡總會有餐廳，結果整棟樓只剩一間萊爾富能救我。架上的熱食幾乎清空，只剩一份冷凍炒飯，微波完後店員又很抱歉地說餐具沒了。', next: 16 },
            { bg: 'IMG_0685.HEIC', speaker: '我', text: '那一刻我愣了一下，接著只覺得這真是山頂流浪的完整儀式。窗外是蘭陽平原的夜景，身後是空蕩行政樓，我忽然明白體面不是今天的主題，活下去才是。', next: 17 },
            { 
                bg: 'IMG_0685.HEIC', speaker: '抉擇', text: '第六題：沒有餐具的晚餐擺在眼前，我要怎麼吃下這碗炒飯？', 
                options: [
                    { title: '以碗就口倒進嘴裡', next: 18 },
                    { title: '用手抓著吃', next: 18 }
                ]
            },
            /* Q8: 驚魂山路 */
            { bg: 'IMG_0687.HEIC', speaker: '下山路', text: '晚上八點以後，探險的浪漫開始迅速退場。我照著 55688 的方式叫車，還加了小費，卻沒有任何司機願意在夜裡開上這座山，黑暗像是慢慢往我身上壓。', next: 19 },
            { bg: 'IMG_0687.HEIC', speaker: '我', text: '媽媽大約每十分鐘打來一次，我一邊安撫她，一邊經過那棟寫著蔬菜學系的陰暗建築，甚至幾度走進死胡同。月光下的山路讓我第一次真的意識到，這不是想像中的遊戲。', next: 20 },
            { 
                bg: 'IMG_0687.HEIC', speaker: '抉擇', text: '第七題：在愈來愈不確定的山路上，我要靠意志力前進，還是停下來承認自己其實已經怕了？', 
                options: [
                    { title: '靠意志力繼續走', next: 21 },
                    { title: '躲回警衛室哭泣', next: 21 }
                ]
            },
            /* Q9: 最後希望 */
            { bg: 'IMG_0687.HEIC', speaker: '警衛室', text: '走到警衛室後，我問了最重要的一句話：最後一班校車幾點？答案是八點半，而且早就開走了。那個瞬間我才真正明白，自己已經被留在山上。', next: 22 },
            { bg: 'IMG_0687.HEIC', speaker: '我', text: '我重新握緊手機、錢包與剩下不多的電量，再次打電話給車行，語氣已經接近求助。原本那些浪漫的隨機性，在這裡全部變成了對安全感的現實需求。', next: 23 },
            { 
                bg: 'IMG_0687.HEIC', speaker: '抉擇', text: '第八題：在真正需要救援的時候，我要不要把自己的處境原封不動地告訴媽媽？', 
                options: [
                    { title: '繼續瞞著她假裝安全', next: 24 },
                    { title: '崩潰求救', next: 24 }
                ]
            },
            /* Q10: 平安歸途 */
            { bg: 'IMG_0703.HEIC', speaker: '運氣', text: '等了將近二十分鐘後，山路盡頭終於出現兩道車燈。那輛特約計程車不是普通交通工具，而像是把我從末日場景裡撈出來的最後希望。', next: 25 },
            { bg: 'IMG_0703.HEIC', speaker: '礁溪車站', text: '晚上 21:44，我終於登上往臺北的自強號。車門關上的那一刻，我才感覺胸口那塊一直收緊的地方慢慢鬆開，從山頂的孤島重新回到熟悉世界。', next: 26 },
            { 
                bg: 'IMG_0703.HEIC', speaker: '抉擇', text: '第九題：如果未來還有類似的單人探險，我應該帶著什麼原則再次出發？', 
                options: [
                    { title: '不作功課但確保安全', next: 27 },
                    { title: '乖乖去爬象山', next: 27 }
                ]
            },
            { bg: 'IMG_0703.HEIC', speaker: '終章', text: '午夜十二點，我推開家門，媽媽坐在客廳等我。回頭看，這九個小時不是單純的旅行，而是一場把鬆架構、陌生人交流、恐懼與安全感全部攤開來檢驗的壓力測試。', next: 27 },
            { 
                bg: 'IMG_0703.HEIC', speaker: '抉擇', text: '第十題：替這趟旅程下一個結論時，我最該記住的是什麼？', 
                options: [
                    { title: '接受隨機，但事前補足安全準備', next: 28 },
                    { title: '從此拒絕所有山頂流浪', next: 28 }
                ]
            },
            { bg: 'IMG_0703.HEIC', speaker: '結語', text: '這趟佛光大學之旅之所以難忘，不是因為我完成了多厲害的壯舉，而是因為我真的在陌生裡看見自己。探險可以沒有標準答案，但不能沒有底線；而所有驚險，最後都讓我更確定自己想留下怎樣的旅行記憶，也讓我知道下一次出發前，浪漫與備案都必須一起帶上。', next: 'END' }
        ];

        let currentIndex = 0;
        let isTyping = false;
        let qCount = 1;

        function startGame() {
            document.getElementById('start-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('start-overlay').style.display = 'none';
                document.getElementById('text-box-container').style.display = 'block';
                updateFrame();
            }, 1500);
        }

        function updateFrame() {
            const current = scenario[currentIndex];
            const bg = document.getElementById('game-bg');
            
            // 背景平滑切換
            bg.style.backgroundImage = `url('${current.bg}')`;
            
            // 更新進度顯示 (簡單估計)
            if(current.speaker === '抉擇') {
                document.getElementById('progress').innerText = `冒險抉擇點：${qCount} / 10`;
                qCount++;
            }
            
            document.getElementById('speaker-name').innerText = current.speaker;
            typeEffect(current.text);
            
            document.getElementById('options-container').style.display = 'none';
        }

        function typeEffect(text) {
            const dialog = document.getElementById('dialogue-text');
            dialog.innerText = '';
            isTyping = true;
            let i = 0;
            const timer = setInterval(() => {
                dialog.innerText += text[i];
                i++;
                if (i >= text.length) {
                    clearInterval(timer);
                    isTyping = false;
                    checkShowOptions();
                }
            }, 35);
        }

        function checkShowOptions() {
            const current = scenario[currentIndex];
            if (current.options) {
                const optContainer = document.getElementById('options-container');
                optContainer.innerHTML = '';
                current.options.forEach(opt => {
                    const btn = document.createElement('div');
                    btn.className = 'option-btn';
                    btn.innerText = opt.title;
                    btn.onclick = () => handleOption(opt.next);
                    optContainer.appendChild(btn);
                });
                optContainer.style.display = 'flex';
                document.getElementById('next-indicator').style.display = 'none';
            } else {
                document.getElementById('next-indicator').style.display = 'block';
            }
        }

        function handleOption(nextId) {
            if (nextId === 'END_HOME') { alert('你回家睡覺了。冒險結束。'); location.reload(); return; }
            if (nextId === 'END_BACK') { alert('你決定撤退，坐回礁溪平原。'); location.reload(); return; }
            currentIndex = nextId;
            updateFrame();
        }

        function nextAction() {
            if (isTyping) return;
            const current = scenario[currentIndex];
            if (current.options) return; 
            
            if (current.next === 'END') {
                alert('【冒險達成】你成功完成了 15 分鐘的深度探險報告！');
                location.reload();
            } else {
                currentIndex = current.next;
                updateFrame();
            }
        }
    </script>
</body>
</html>
