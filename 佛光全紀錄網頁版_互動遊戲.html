<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>佛光山探險：視覺小說冒險（精修比例版）</title>
    <style>
        :root {
            --textbox-bg: rgba(22, 14, 10, 0.98);
            --option-bg: linear-gradient(180deg, #d4a76a 0%, #8b5a2b 100%);
            --option-border: #f3e5ab;
            --clock-color: #f3e5ab;
            --panel-width: 250px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: pointer; user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: black; font-family: "Noto Sans TC", sans-serif; }

        /* 全域背景穩定：不隨組件縮放 */
        #game-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; transition: opacity 1s; z-index: 1; }
        .vignette { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, transparent 20%, rgba(0,0,0,1) 100%); z-index: 2; pointer-events: none; }

        /* 左側地圖：固定不重疊 */
        #adventure-map-wrap {
            position: fixed;
            left: 30px;
            top: 50%;
            transform: translateY(-50%);
            width: 220px;
            height: 520px;
            background: rgba(26, 15, 12, 0.92);
            border: 4px solid #8b5a2b;
            border-radius: 4px;
            padding: 25px 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 30;
            box-shadow: 0 0 35px rgba(0,0,0,1);
        }
        .map-node { display: flex; align-items: center; gap: 12px; opacity: 0.3; transition: 0.5s; }
        .map-node.active { opacity: 1; transform: scale(1.05); color: #fff; font-weight: bold; }
        .map-node.past { opacity: 0.6; color: #8b5a2b; }
        .node-dot { width: 14px; height: 14px; border: 2px solid #f3e5ab; border-radius: 50%; }
        .active .node-dot { background: #f3e5ab; box-shadow: 0 0 12px #f3e5ab; }

        /* 右側時鐘：正圓大型 */
        #adventure-clock-wrap {
            position: fixed;
            right: 30px;
            top: 50%;
            transform: translateY(-50%);
            width: 250px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 30;
        }
        #adventure-clock {
            width: 200px; height: 200px;
            border-radius: 50%;
            border: 10px solid #f3e5ab;
            position: relative;
            background: rgba(18, 12, 10, 0.95);
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }
        #clock-fill {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: conic-gradient(var(--clock-color) 0%, transparent 0%);
            transition: 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0.8;
        }
        #clock-label { color: #f3e5ab; font-size: 1.7rem; margin-top: 25px; font-weight: 900; background: rgba(0,0,0,0.6); padding: 8px 30px; border-radius: 50px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }

        /* 中心劇情圖：精確收縮寬度，騰出兩側空間 */
        #scene-image-wrap {
            position: fixed;
            left: 50%;
            /* 從頂部開始，高度到對話框上方留出足夠空間 */
            top: 20px;
            transform: translateX(-50%);
            /* 寬度扣除兩側面板與間距 */
            width: calc(100vw - 560px);
            /* 高度只到螢幕60%，確保下方有對話框和選項空間 */
            height: calc(100vh - 320px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        #scene-image-stage { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        #scene-image { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 4px; border: 8px solid #f3e5ab; outline: 3px solid #281510; box-shadow: 0 0 100px rgba(0,0,0,1); background: #000; }
        #choice-dim { position: absolute; background: rgba(0,0,0,0.42); backdrop-filter: blur(3px); z-index: 5; display: none; border-radius: 4px; pointer-events: none; }

        /* 對話框區域 — 加入質感與玻璃反光效果 */
        #text-box-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 1000px;
            z-index: 50;
            /* 進場動畫 */
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes slideUp { from { opacity: 0; transform: translate(-50%, 20px); } to { opacity: 1; transform: translate(-50%, 0); } }

        #text-box {
            background: rgba(22, 14, 10, 0.92);
            backdrop-filter: blur(12px);
            border: 3px solid rgba(243, 229, 171, 0.4);
            border-top: 3px solid rgba(243, 229, 171, 0.8);
            border-radius: 8px;
            padding: 35px 50px;
            min-height: 180px;
            position: relative;
            box-shadow: 0 25px 80px rgba(0,0,0,0.8), inset 0 0 40px rgba(139, 90, 43, 0.1);
        }
        #speaker-name {
            position: absolute;
            top: -24px;
            left: 45px;
            background: linear-gradient(135deg, #a66a33, #7a481c);
            border: 2px solid #f3e5ab;
            border-radius: 4px;
            color: #f3e5ab;
            padding: 8px 32px;
            font-weight: 900;
            font-size: 1.35rem;
            letter-spacing: 2px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            white-space: nowrap;
        }
        #dialogue-text { color: #fdf5d3; font-size: 1.55rem; line-height: 1.8; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); }
        #text-box.with-hint #dialogue-text { padding-right: 320px; font-size: 1.4rem; line-height: 1.7; }
        
        #question-hint {
            position: absolute;
            top: 25px;
            right: 25px;
            width: 280px;
            min-height: 120px;
            max-height: 170px;
            overflow-y: auto;
            padding: 18px;
            display: none;
            background: rgba(38, 22, 15, 0.85);
            backdrop-filter: blur(8px);
            border-left: 4px solid #f3e5ab;
            border-radius: 0 4px 4px 0;
            box-shadow: -5px 0 20px rgba(0,0,0,0.5);
            color: #f7e7bb;
        }
        #question-hint-title { font-size: 0.95rem; font-weight: 900; letter-spacing: 1px; margin-bottom: 8px; color: #f3e5ab; }
        #question-hint-text { font-size: 0.93rem; line-height: 1.65; }

        /* 選項按鈕：加入呼吸光暈與彈性進場 */
        #options-container {
            position: fixed;
            /* 距底部留給對話框高度(約180)+間距 */
            bottom: max(300px, 35vh);
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: none;
            flex-direction: column;
            gap: 20px;
            width: 500px;
        }
        .option-btn {
            background: linear-gradient(135deg, rgba(212, 167, 106, 0.95) 0%, rgba(139, 90, 43, 0.95) 100%);
            backdrop-filter: blur(5px);
            border: 2px solid #ffe6a0;
            border-radius: 6px;
            padding: 22px;
            color: #2c1810;
            font-weight: 900;
            font-size: 1.6rem;
            letter-spacing: 2px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6), inset 0 2px 5px rgba(255, 255, 255, 0.3);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) backwards;
        }
        /* 子元素循序延遲動畫 (需搭配JS或直接讓全體一起彈出) */
        .option-btn:nth-child(2) { animation-delay: 0.1s; }
        
        @keyframes popIn { from { opacity: 0; transform: scale(0.9) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        .option-btn:hover { 
            transform: translateY(-5px) scale(1.02); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), 0 0 20px rgba(243, 229, 171, 0.5); 
            border-color: #ffffff;
            color: #1a0f0a;
        }
        
        /* 按鈕掃光效果 */
        .option-btn::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.3) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg);
            transition: 0s;
        }
        .option-btn:hover::after {
            left: 200%;
            transition: 0.8s ease-in-out;
        }

        #next-indicator { position: absolute; bottom: 25px; right: 40px; color: #f3e5ab; font-size: 1.8rem; animation: bounce 0.8s infinite alternate; text-shadow: 0 0 10px rgba(243, 229, 171, 0.8); }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(8px); } }

        #ending-notes {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.82);
            backdrop-filter: blur(8px);
            z-index: 260;
            padding: 40px;
        }
        #ending-notes-card {
            width: min(980px, 92vw);
            max-height: 88vh;
            overflow: auto;
            background: rgba(26, 15, 12, 0.97);
            border: 4px solid #f3e5ab;
            box-shadow: 0 20px 60px rgba(0,0,0,0.9);
            padding: 32px 36px;
            color: #f3e5ab;
        }
        #ending-notes-markdown { font-family: "Noto Sans TC", sans-serif; }
        #ending-notes-markdown h1 {
            margin: 0 0 18px;
            font-size: 2rem;
            line-height: 1.3;
            color: #fff0bf;
        }
        #ending-notes-markdown h2 {
            margin: 26px 0 14px;
            font-size: 1.45rem;
            line-height: 1.4;
            color: #f3e5ab;
        }
        #ending-notes-markdown ul {
            margin: 0 0 0 1.4rem;
            padding: 0;
        }
        #ending-notes-markdown li {
            margin: 0 0 12px;
            line-height: 1.85;
            font-size: 1.08rem;
        }
        #ending-notes-markdown blockquote {
            margin: 18px 0 0;
            padding: 16px 18px;
            border-left: 4px solid #f3e5ab;
            background: rgba(243, 229, 171, 0.08);
            color: #fff0bf;
            font-size: 1.1rem;
            line-height: 1.8;
        }
        #ending-notes-markdown p {
            margin: 0 0 14px;
            line-height: 1.8;
            font-size: 1.08rem;
        }
        #ending-notes-markdown blockquote p,
        #ending-notes-markdown li p {
            margin: 0;
        }
        #ending-notes-markdown strong { color: #fff0bf; }
        #ending-notes-markdown code {
            padding: 2px 6px;
            background: rgba(243, 229, 171, 0.12);
            border-radius: 4px;
            font-family: Consolas, monospace;
            font-size: 0.95em;
        }
        #ending-notes-markdown hr {
            border: 0;
            border-top: 1px solid rgba(243, 229, 171, 0.28);
            margin: 22px 0;
        }
        #ending-notes-markdown ol {
            margin: 0 0 0 1.4rem;
            padding: 0;
        }
        #ending-notes-markdown table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        #ending-notes-markdown th,
        #ending-notes-markdown td {
            border: 1px solid rgba(243, 229, 171, 0.3);
            padding: 10px 12px;
            text-align: left;
            vertical-align: top;
            line-height: 1.7;
        }
        #ending-notes-markdown th { color: #fff0bf; }
        #ending-notes-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 24px;
        }
        #ending-notes-actions button {
            background: var(--option-bg);
            border: 3px solid var(--option-border);
            color: #2c1810;
            font-weight: 900;
            font-size: 1.1rem;
            padding: 14px 30px;
            box-shadow: 6px 6px 0 #000;
        }

        /* 首頁 */
        #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 200; display: flex; align-items: center; justify-content: center; padding: 25px; transition: opacity 1s; }
        #start-img-wrap { width: 100%; height: 100%; border: 15px solid #fff; outline: 5px solid #000; position: relative; overflow: hidden; }
        #start-img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.6); }
        #start-meta {
            position: absolute;
            top: 16%;
            width: 100%;
            text-align: center;
            color: #fff0bf;
            font-size: 1.6rem;
            font-weight: 800;
            text-shadow: 4px 4px 0 #000;
            letter-spacing: 2px;
        }
        #start-actions {
            position: absolute;
            bottom: 12%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
        }
        .start-btn {
            padding: 25px 150px;
            font-size: 3.2rem;
            background: #8b5a2b;
            border: 5px solid #f3e5ab;
            color: #fff;
            font-weight: 950;
            box-shadow: 12px 12px 0 #000;
        }
        .start-secondary-btn {
            padding: 16px 70px;
            font-size: 1.6rem;
            background: rgba(32, 18, 12, 0.92);
            border: 3px solid #f3e5ab;
            color: #f3e5ab;
            font-weight: 900;
            box-shadow: 8px 8px 0 #000;
        }
        #start-date {
            color: #fff0bf;
            font-size: 1.2rem;
            font-weight: 800;
            text-shadow: 3px 3px 0 #000;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div id="start-overlay">
        <div id="start-img-wrap">
            <img id="start-img" src="web-images/IMG_0671.jpg">
            <div id="start-meta">報告者為：閻星澄</div>
            <h1 style="position: absolute; top: 35%; width: 100%; text-align: center; color: #fff; font-size: 6.5rem; letter-spacing: 25px; text-shadow: 8px 8px 0 #000; font-weight: 950;">佛光山：末日流浪</h1>
            <div id="start-actions">
                <button class="start-btn" onclick="startGame()">START</button>
                <button class="start-secondary-btn" onclick="showFullReport()">旅行後記</button>
                <div id="start-date">2026.4月8號</div>
            </div>
        </div>
    </div>

    <div id="game-bg"></div>
    <div class="vignette"></div>

    <!-- 左側面板：地標軌跡 -->
    <div id="adventure-map-wrap">
        <div class="map-node" data-idx="0"><div class="node-dot"></div><div class="node-text">臺北車站</div></div>
        <div class="map-node" data-idx="3"><div class="node-dot"></div><div class="node-text">臺鐵之旅</div></div>
        <div class="map-node" data-idx="8"><div class="node-dot"></div><div class="node-text">宜蘭坐過站</div></div>
        <div class="map-node" data-idx="10"><div class="node-dot"></div><div class="node-text">計程車父子</div></div>
        <div class="map-node" data-idx="12"><div class="node-dot"></div><div class="node-text">雲起樓門口</div></div>
        <div class="map-node" data-idx="14"><div class="node-dot"></div><div class="node-text">萊爾富生存</div></div>
        <div class="map-node" data-idx="16"><div class="node-dot"></div><div class="node-text">蔬菜學系驚魂</div></div>
        <div class="map-node" data-idx="18"><div class="node-dot"></div><div class="node-text">警衛室絕望</div></div>
        <div class="map-node" data-idx="20"><div class="node-dot"></div><div class="node-text">獲救礁溪站</div></div>
        <div class="map-node" data-idx="21"><div class="node-dot"></div><div class="node-text">回到家門</div></div>
    </div>

    <!-- 右側面板：冒險鐘 -->
    <div id="adventure-clock-wrap">
        <div id="adventure-clock"><div id="clock-fill"></div></div>
        <div id="clock-label">15:00</div>
    </div>

    <!-- 中間劇情圖 -->
    <div id="scene-image-wrap">
        <div id="scene-image-stage">
            <img id="scene-image" alt="劇情圖片">
            <div id="choice-dim"></div>
        </div>
    </div>

    <div id="options-container"></div>

    <div id="text-box-container" onclick="nextAction()">
        <div id="text-box">
            <div id="speaker-name">主角</div>
            <div id="dialogue-text">...</div>
            <div id="question-hint">
                <div id="question-hint-title">情境提示</div>
                <div id="question-hint-text"></div>
            </div>
            <div id="next-indicator">▼</div>
        </div>
    </div>

    <div id="ending-notes">
        <div id="ending-notes-card">
            <div id="ending-notes-markdown"></div>
            <div id="ending-notes-actions">
                <button id="ending-notes-button" onclick="handleNotesAction()">重新開始</button>
            </div>
        </div>
    </div>

    <script>
        const scenario = [
            /* 0-2 出發 */
            { bg: 'web-images/IMG_0655.jpg', image: 'web-images/IMG_0649.jpg', label: '15:00', dialogues: [
                { speaker: '旁白', text: '老師說，旅行的第一步是設定目標。我的目標其實很模糊，卻也很真誠：追隨隨機性。' },
                { speaker: '旁白', text: '這趟旅行從一開始就不是為了效率，而是為了看看自己能不能在未知裡撐住好奇心。' },
                { speaker: '旁白', text: '換句話說，我不是要去完成一條標準路線，而是想知道自己能不能在陌生裡繼續往前。' }
            ], next: 1 },
            { bg: 'web-images/IMG_0655.jpg', image: 'web-images/IMG_0650.jpg', label: '15:20', dialogues: [
                { speaker: '我', text: '出門前我才發現忘了防曬。這一天，我不想只重複平庸的行程。我決定去佛光大學。' },
                { speaker: '我', text: '和一座早已走熟的象山相比，佛大帶著一種荒涼又稀有的吸引力。' },
                { speaker: '我', text: '它像一個幾乎不會再去第二次的地點，正因為如此，我反而更想把今天押在那裡。' }
            ], next: 2 },
            { 
                bg: 'web-images/IMG_0655.jpg', image: 'web-images/IMG_0665.jpg', speaker: '抉擇', text: '第一題：當象山忽然變得毫無新鮮感，而佛光大學又像一個幾乎不會再去第二次的地方時，我該回頭收手，還是乾脆把今天押在這場未知上？', label: '抉擇中', hint: '原本你只是想去象山，但忘了防曬，又覺得象山每年至少爬一次，早就失去新鮮感。佛光大學則因停辦陰影與山頂位置，突然變得很有探險價值。',
                options: [ { title: '打道回府避暑', next: 'END_HOME' }, { title: '衝去佛光大學', next: 3 } ]
            },
            /* 3-4 臺鐵 */
            { bg: 'web-images/IMG_0653.jpg', image: 'web-images/IMG_0661.jpg', label: '16:00', dialogues: [
                { speaker: '我', text: '血液開始沸騰。搭臺鐵速度較快，約一個半小時可抵達礁溪。我決定把熱血押在佛大身上。' },
                { speaker: '我', text: '我幾乎從未一個人衝去外縣市，這趟臨時起意的出發，反而讓我覺得自己終於真正跨出去。' },
                { speaker: '我', text: '那種心情很像站在門檻前，只要一上車，今天就會變成和平常完全不同的一天。' }
            ], next: 4 },
            { 
                bg: 'web-images/IMG_0653.jpg', image: 'web-images/IMG_0657.jpg', speaker: '抉擇', text: '第二題：既然都已經決定衝去宜蘭山上的佛光大學了，我接下來要維持那股熱血直接出發，還是先把防曬與準備補齊，讓自己稍微像個正常旅人？', label: '抉擇中', hint: 'AI 建議你選佛光大學，因為臺鐵動線比較直接，約一個半小時可抵礁溪。那一刻你很熱血，但其實也知道自己準備得不多。',
                options: [ { title: '熱血衝一波', next: 5 }, { title: '買個防曬再走', next: 5 } ]
            },
            /* 5-7 坐過站 */
            { bg: 'web-images/IMG_0653.jpg', image: 'web-images/IMG_0663.jpg', label: '17:00', dialogues: [
                { speaker: '臺鐵', text: '窗外先是密集建築，再來是工廠與田野交錯。感覺到自己正從日常被一點點抽離。' },
                { speaker: '臺鐵', text: '我坐在靠窗的位置，幾乎整段路都盯著外面看，像在看一部城市慢慢褪色的紀錄片。' },
                { speaker: '臺鐵', text: '這正是那種 relaxed, see what happens 的時刻，我什麼都不做，只讓景色帶著我前進。' }
            ], next: 6 },

## 旅程日期：2026年4月初
## 報告人：閻星澄

---

## 壹、設定目標：在隨機中尋找自己

老師說，旅行的第一步是設定一個目標。我的目標很模糊，卻也很真誠：**「追隨隨機性，嘗試與陌生人交流」**。

這一天本來計畫去臺北象山。但出門前，我發現忘了塗防曬，加上象山每年至少爬一次早已失去新鮮感。就在那個猶豫的瞬間，某種「鬆架構」的本能啟動了，我決定去一個這輩子可能再也去不到的地方。**佛光大學**的名字浮現在腦海中。它因為大環境因素面臨停辦，坐落在宜蘭山頂的邊疆地帶，幾乎沒有任何人會獨自前往。

我詢問了 AI，它建議從兩所候選學校（佛光大學、中華大學）中選擇佛光大學，因為搭乘臺鐵交通動線較為直接，約一個半小時可抵礁溪。那一刻，我感到熱血沸騰。我幾乎從未獨自前往外縣市，而這一次，我選擇了一個具有真正「探險價值」的地方作為首站。

---

## 貳、鬆架構的行程：城市褪去，田野浮現 (15:30 - 17:30)

下午三點半，我抵達臺北車站。這是我第一次有意識地主動搭乘臺鐵，車廂內部出乎意料地舒適，那種感覺像是「加大版的捷運」。我坐在靠窗的位置，眼睛黏在窗外移不開。

窗外的景色，是一部微型的地理演化史：
- **初段**：建築物密集，城市的呼吸聲還在。
- **中段**：工廠開始出現，田野穿插其間，節奏開始變慢。
- **深段**：綠意覆蓋了一切，我感覺自己正從日常生活中「脫隊」。

這正是老師說的「relaxed, see what happens」，我讓自己放空，只是看，只是感受。

中途，我想起課堂上的小作業：與陌生人交流。我試圖打開校園 BBS，在版上詢問是否有人願意吃飯聊天。但版面極度冷清，整整一天只有一則貼文。我把手機放下，靠在椅背上想著，或許交流會在另一個意想不到的地方發生。

然後，戲劇性的事發生了：**我坐過頭了**。當我驚醒，火車已經停在宜蘭站，而不是原定的礁溪。我慌亂地走向詢問處，補了 11 元的票價差額。走出站後，AI 安慰我說宜蘭也順路。我接受了這個「意外」，甚至覺得它讓這趟旅程變得更真實。

> **Serendipity 出現了**：坐過頭，是這趟旅程最戲劇性的伏筆。

---

## 參、對話：計程車上的父子檔 (17:30 - 18:00)

從宜蘭站出來，我招了一輛計程車。上車前，我看到車上已有一名男性乘客，猶豫要不要上去。司機突然說：「那是我兒子，你上來吧。」

這是這趟旅程中第一個真正的「人際接觸」。

原來，司機剛結束在礁溪國小擔任校車的職務，正帶著兒子繼續接計程車的班。車上展開了一段充滿角色拉扯的對話：

**兒子（語氣隨性地問）**：「今天是不是放假？你怎麼現在才上山？」

**我（保留地回答）**：「有上課喔，我也是要去學校。」

那一刻，我感到一種微妙的尷尬，當天明明是我們政治大學的校慶，我卻在遙遠的宜蘭山區，試圖扮演一個佛光大學學生的角色。

**兒子（再追問）**：「你確定沒放假嗎？那你為什麼現在還要上山？」

**我（最終坦承）**：「其實我不是這裡的學生。我只是來做一個探索作業的。」

沉默了一兩秒，司機父子相視而笑，露出那種「原來如此」的理解神情。

我沉默地看著窗外，天色在山路的蜿蜒中以驚人的速度轉黑。才傍晚六點，卻已像深夜。那種光線的消失，讓我的心臟逐漸繃緊。

到了山路入口，司機問我在哪裡下車。我完全不熟悉，只能模糊地說：「行政大樓那邊吧。」在候車亭遇到了一位等校車的學生，他告訴我，那棟最高處的建築叫做**「雲起樓」**。

## 肆、看到什麼、感受到什麼：雲起樓的夢核與末日感 (18:00 - 20:30)

站在「雲起樓」前，我第一個念頭是：**這裡像是「Dreamcore（夢核）」影像成真了。**

### 空間的詭譎感

大樓內部燈光昏暗，入口處的走馬燈依然冰冷地播報著防疫措施，那是疫情時代的遺跡，如今卻依然閃爍著，像是一個時空錯位的訊號。我放眼望去，整棟行政大樓的學生不超過五位。二、三樓雖然開放，但那種空曠和回音讓我完全沒有勇氣獨自踏上去。

媽媽剛好打電話來。她以為我在象山，快要下山了。當我告訴她我在「佛光大學」，她不相信，直到我把那輛印有佛光大學字樣的遊覽車拍給她看。

「你在哪裡？那裡怎麼這麼暗？」她的聲音裡出現了一絲不安。

### 以碗就口的晚餐

上山前，司機父子曾主動詢問是否要給我一份餐盒，我客氣地婉拒了，心想校園內部一定有餐廳。但實際上，整棟行政大樓只有一間萊爾富，而且所有的加熱食品全部售罄，只剩下一份冷凍炒飯。

我請店員微波。微波完成後，店員尷尬地說：「同學，我們餐具沒有了。」

我愣了一秒。然後，在這座人煙稀少的山頂上，我做了一個非常本能的決定：**以碗就口，把米飯直接倒進嘴裡**。

那是我吃過最「原始」的一頓飯，卻也是最有滋味的一頓，不是因為食物本身，而是那種孤立無援的真實感，讓人竟然有點想笑。

### 蘭陽平原的懸崖美景

填飽肚子後，我走到大樓外。眼前是近乎懸崖的絕壁，而絕壁之下，是整個蘭陽平原在夜色中閃爍的萬家燈火。那種衝突感非常強烈：腳下是繁華與人間煙火，身後是寂靜得令人心驚的廢校氛圍。

我買了一盒巧克力，決定用步行的方式繼續探索。

---

## 伍、如何迷路：意志力的懸崖 (20:30 - 21:00)

探險的浪漫在夜晚八點之後迅速轉化成現實的壓力。

我根據司機教我的 55688 系統嘗試叫車，加了優先小費，卻始終沒有任何司機願意進山接客。媽媽的電話大約每十分鐘響一次，我在通話中儘量保持冷靜，隱瞞了幾百塊錢的車費，也隱瞞了此刻真正的慌張。

下山途中，我路過了一棟寫著**「蔬菜學系」**的建築。那棟樓的模樣在月光下令人心驚膽戰，斑駁的牆面、昏暗的走廊，讓我壓根不敢靠近。我甚至幾度走進了死胡同，路都走不通，在山間黑暗中無助地倒退。

走了大約二十分鐘，終於抵達警衛室。

「最後一班校車幾點？」我問。

「八點半，但已經走了。」

那一刻，我確實感到了害怕。

我重新向車行求助，請他們指派司機。又等了二十分鐘，看見計程車的燈光從蜿蜒的山路中出現時，我身體裡某個一直繃緊的東西，突然鬆開了。

---

## 陸、歸途：自強號與平安 (21:00 - 00:00)

- **21:44**：在礁溪車站登上自強號，往臺北方向。
- **23:30**：抵達臺北車站，重新感受熟悉的城市噪音與燈光。
- **00:00**：踏入家門，媽媽坐在客廳等我。

---

## 柒、反身性思考：流浪的正名

回顧這趟旅程，它從「一個忘記塗防曬的午後」演變成「一場長達九個小時的山頂流浪」。

這整件事，我認為它非常精準地命中了「一個人的旅行」的核心精神：

1. **關於「鬆架構」**：我沒有行程表，只有一個方向感。坐過頭不是失敗，它讓我遇見了父子司機；拒絕餐盒不是失誤，它讓我有了「以碗就口」那個只屬於我的奇特時刻。Serendipity 就是這樣發生的，你得先放棄控制，它才會出現。

2. **關於陌生人的交流**：真正的交流不在網路論壇上，而是在那輛晃動的山區計程車裡，在那句「你確定你不是學生嗎」的反問後，我選擇了坦誠。

3. **關於勇氣與安全感的辯證**：我一直靠「意志力壯膽」撐過那段黑暗的山路，但我同時也深刻體認到，**探險可以不帶攻略，但不能沒有基本的安全意識**。末班車的班次、通訊設備的電量、緊急聯絡的備案，這些是「浪漫探險」與「危險流浪」之間的界線。

4. **關於這堂課的意義**：與其說我完成了一項作業，不如說我完成了一次對自己的壓力測試。我發現，孤獨並不是靜止的，它會隨著環境的黑暗與陌生而加劇，也會因為一個陌生司機的笑容，或是媽媽電話的接通聲，而瞬間被稀釋。

        function startGame() {
            document.getElementById('start-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('start-overlay').style.display = 'none';
                updateFrame();
            }, 1000);
        }

        function updateFrame() {
            const current = scenario[currentIndex];
            const bg = document.getElementById('game-bg');
            const sceneImageWrap = document.getElementById('scene-image-wrap');
            const sceneImage = document.getElementById('scene-image');
            const clockFill = document.getElementById('clock-fill');
            const clockLabel = document.getElementById('clock-label');
            const choiceDim = document.getElementById('choice-dim');
            
            bg.style.backgroundImage = `url('${current.bg}')`;
            if (current.image) {
                sceneImage.src = current.image;
                sceneImage.onload = syncChoiceDim;
                sceneImageWrap.style.display = 'flex';
                requestAnimationFrame(syncChoiceDim);
            } else {
                sceneImageWrap.style.display = 'none';
                choiceDim.style.display = 'none';
            }
            
            // 更新時鐘
            const percent = ((currentIndex + 1) / scenario.length) * 100;
            let clockColor = '#f3e5ab';
            if (percent > 40) clockColor = '#ff8c00';
            if (percent > 75) clockColor = '#9370db';
            document.documentElement.style.setProperty('--clock-color', clockColor);
            clockFill.style.background = `conic-gradient(${clockColor} ${percent}%, transparent 0%)`;
            clockLabel.innerText = current.label;

            // 更新地圖
            document.querySelectorAll('.map-node').forEach(node => {
                const nodeIdx = parseInt(node.getAttribute('data-idx'));
                node.classList.remove('active', 'past');
                if (nodeIdx === currentIndex) node.classList.add('active');
                else if (nodeIdx < currentIndex) node.classList.add('past');
            });

            currentDialogueIndex = 0;
            renderDialogue();
            document.getElementById('options-container').style.display = 'none';
            choiceDim.style.display = 'none';
        }

        function syncChoiceDim() {
            const sceneImage = document.getElementById('scene-image');
            const choiceDim = document.getElementById('choice-dim');
            if (!sceneImage || !choiceDim || !sceneImage.src) return;
            choiceDim.style.left = `${sceneImage.offsetLeft}px`;
            choiceDim.style.top = `${sceneImage.offsetTop}px`;
            choiceDim.style.width = `${sceneImage.clientWidth}px`;
            choiceDim.style.height = `${sceneImage.clientHeight}px`;
        }

        function getDialogueEntry(scene) {
            if (scene.dialogues) return scene.dialogues[currentDialogueIndex];
            return { speaker: scene.speaker, text: scene.text };
        }

        function renderDialogue() {
            const current = scenario[currentIndex];
            const dialogue = getDialogueEntry(current);
            document.getElementById('speaker-name').innerText = dialogue.speaker;
            syncQuestionHint(current);
            typeEffect(dialogue.text);
        }

        function syncQuestionHint(current) {
            const hintBox = document.getElementById('question-hint');
            const hintText = document.getElementById('question-hint-text');
            const textBox = document.getElementById('text-box');
            if (current.options && current.hint) {
                hintText.innerText = current.hint;
                hintBox.style.display = 'block';
                textBox.classList.add('with-hint');
            } else {
                hintText.innerText = '';
                hintBox.style.display = 'none';
                textBox.classList.remove('with-hint');
            }
        }

        function typeEffect(text) {
            const dialog = document.getElementById('dialogue-text');
            dialog.innerText = '';
            isTyping = true;
            let i = 0;
            const timer = setInterval(() => {
                dialog.innerText += text[i];
                i++;
                if (i >= text.length) { clearInterval(timer); isTyping = false; checkShowOptions(); }
            }, 25);
        }

        function checkShowOptions() {
            const current = scenario[currentIndex];
            if (current.options) {
                const optContainer = document.getElementById('options-container');
                const choiceDim = document.getElementById('choice-dim');
                optContainer.innerHTML = '';
                current.options.forEach(opt => {
                    const btn = document.createElement('div');
                    btn.className = 'option-btn';
                    btn.innerText = opt.title;
                    btn.onclick = (e) => { e.stopPropagation(); handleOption(opt.next); };
                    optContainer.appendChild(btn);
                });
                syncChoiceDim();
                choiceDim.style.display = 'block';
                optContainer.style.display = 'flex';
                document.getElementById('next-indicator').style.display = 'none';
            } else {
                document.getElementById('next-indicator').style.display = 'block';
            }
        }

        window.addEventListener('resize', syncChoiceDim);

        function handleOption(nextId) {
            if (nextId === 'END_HOME' || nextId === 'END_BACK') {
                alert('這個選項會讓旅程提早結束，請重新選擇。');
                checkShowOptions();
                return;
            }
            currentIndex = nextId;
            updateFrame();
        }

        function renderInlineMarkdown(text) {
            return text
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
        }

        function renderMarkdown(markdown) {
            const lines = markdown.split('\n');
            const html = [];
            let inList = false;
            let inOrderedList = false;
            let inTable = false;

            const closeOpenBlocks = () => {
                if (inList) {
                    html.push('</ul>');
                    inList = false;
                }
                if (inOrderedList) {
                    html.push('</ol>');
                    inOrderedList = false;
                }
                if (inTable) {
                    html.push('</tbody></table>');
                    inTable = false;
                }
            };

            for (const rawLine of lines) {
                const line = rawLine.trim();

                if (!line) {
                    closeOpenBlocks();
                    continue;
                }

                if (line === '---') {
                    closeOpenBlocks();
                    html.push('<hr>');
                    continue;
                }

                if (line.startsWith('## ')) {
                    closeOpenBlocks();
                    html.push(`<h2>${renderInlineMarkdown(line.slice(3))}</h2>`);
                    continue;
                }

                if (line.startsWith('# ')) {
                    closeOpenBlocks();
                    html.push(`<h1>${renderInlineMarkdown(line.slice(2))}</h1>`);
                    continue;
                }

                if (line.startsWith('- ')) {
                    if (inOrderedList) {
                        html.push('</ol>');
                        inOrderedList = false;
                    }
                    if (inTable) {
                        html.push('</tbody></table>');
                        inTable = false;
                    }
                    if (!inList) {
                        html.push('<ul>');
                        inList = true;
                    }
                    html.push(`<li>${renderInlineMarkdown(line.slice(2))}</li>`);
                    continue;
                }

                if (/^\d+\.\s+/.test(line)) {
                    if (inList) {
                        html.push('</ul>');
                        inList = false;
                    }
                    if (inTable) {
                        html.push('</tbody></table>');
                        inTable = false;
                    }
                    if (!inOrderedList) {
                        html.push('<ol>');
                        inOrderedList = true;
                    }
                    html.push(`<li>${renderInlineMarkdown(line.replace(/^\d+\.\s+/, ''))}</li>`);
                    continue;
                }

                if (line.startsWith('|') && line.endsWith('|')) {
                    const cells = line.split('|').slice(1, -1).map(cell => cell.trim());
                    const isSeparator = cells.every(cell => /^:?-+:?$/.test(cell));
                    if (isSeparator) {
                        continue;
                    }
                    if (inList) {
                        html.push('</ul>');
                        inList = false;
                    }
                    if (inOrderedList) {
                        html.push('</ol>');
                        inOrderedList = false;
                    }
                    if (!inTable) {
                        html.push('<table><tbody>');
                        inTable = true;
                    }
                    const tag = html[html.length - 1] === '<table><tbody>' ? 'th' : 'td';
                    html.push(`<tr>${cells.map(cell => `<${tag}>${renderInlineMarkdown(cell)}</${tag}>`).join('')}</tr>`);
                    continue;
                }

                if (line.startsWith('> ')) {
                    closeOpenBlocks();
                    html.push(`<blockquote><p>${renderInlineMarkdown(line.slice(2))}</p></blockquote>`);
                    continue;
                }

                closeOpenBlocks();
                html.push(`<p>${renderInlineMarkdown(line)}</p>`);
            }

            closeOpenBlocks();

            return html.join('');
        }

        function openNotesPanel(markdown, mode) {
            notesMode = mode;
            const notesRoot = document.getElementById('ending-notes');
            const notesCard = document.getElementById('ending-notes-card');
            document.getElementById('ending-notes-markdown').innerHTML = renderMarkdown(markdown);
            document.getElementById('ending-notes-button').innerText = mode === 'full-report' ? '關閉' : '重新開始';
            notesRoot.style.display = 'flex';
            notesCard.scrollTop = 0;
        }

        function showFullReport() {
            openNotesPanel(fullReportMarkdown, 'full-report');
        }

        function handleNotesAction() {
            if (notesMode === 'full-report') {
                document.getElementById('ending-notes').style.display = 'none';
                return;
            }
            location.reload();
        }

        function showEndingNotes() {
            openNotesPanel(endingNotesMarkdown, 'ending');
        }

        function nextAction() {
            if (isTyping) return;
            const current = scenario[currentIndex];
            if (current.dialogues && currentDialogueIndex < current.dialogues.length - 1) {
                currentDialogueIndex++;
                renderDialogue();
                return;
            }
            if (current.options) return; 
            if (current.next === 'END') { showEndingNotes(); }
            else { currentIndex = current.next; updateFrame(); }
        }
    </script>
