<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>佛光山探險：視覺小說冒險（地圖全開版）</title>
    <style>
        :root {
            --textbox-bg: rgba(26, 15, 12, 0.98);
            --option-bg: linear-gradient(180deg, #d4a76a 0%, #8b5a2b 100%);
            --option-border: #f3e5ab;
            --clock-color: #f3e5ab;
            --textbox-height: 250px;
            --textbox-bottom-gap: 30px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: pointer; user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: black; font-family: "Noto Sans TC", sans-serif; }

        #game-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; transition: opacity 1.2s; z-index: 1; }
        .vignette { position: fixed; top: 0; left: 0; width: 100%; height: 100%; box-shadow: inset 0 0 250px rgba(0,0,0,1); z-index: 2; pointer-events: none; }

        /* 左側地圖面板 */
        #adventure-map-wrap {
            position: absolute;
            left: -240px;
            top: 50%;
            transform: translateY(-50%);
            width: 220px;
            height: 480px;
            background: rgba(26, 15, 12, 0.85);
            border: 4px solid #f3e5ab;
            border-radius: 10px;
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 20;
            box-shadow: 0 0 30px rgba(0,0,0,1);
        }

        .map-node {
            display: flex;
            align-items: center;
            gap: 10px;
            opacity: 0.3;
            transition: all 0.5s;
        }
        .map-node.active { opacity: 1; transform: scale(1.1); font-weight: bold; color: #fff; }
        .map-node.past { opacity: 0.6; color: #8b5a2b; }

        .node-dot {
            width: 12px; height: 12px;
            background: #8b5a2b;
            border: 2px solid #f3e5ab;
            border-radius: 50%;
        }
        .active .node-dot { background: #f3e5ab; box-shadow: 0 0 10px #f3e5ab; }

        .node-text { font-size: 0.95rem; color: #f3e5ab; }

        /* 右側大型時鐘 (維持正圓) */
        #adventure-clock-wrap {
            position: absolute;
            right: -240px;
            top: 50%;
            transform: translateY(-50%);
            width: 220px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 20;
        }
        #adventure-clock {
            width: 180px; height: 180px;
            border-radius: 50%;
            border: 8px solid #f3e5ab;
            position: relative;
            background: rgba(18, 12, 10, 0.9);
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 30px rgba(0,0,0,1);
        }
        #clock-fill { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: conic-gradient(var(--clock-color) 0%, transparent 0%); transition: all 1s; opacity: 0.8; }
        #clock-label { color: #f3e5ab; font-size: 1.6rem; margin-top: 20px; font-weight: 900; background: rgba(0,0,0,0.5); padding: 5px 20px; border-radius: 50px; }

        /* 劇情圖片容器 */
        #scene-image-wrap { position: fixed; left: 50%; top: 0; transform: translateX(-50%); width: 100vw; height: calc(100vh - 320px); display: none; justify-content: center; align-items: center; z-index: 9; padding-top: 20px; }
        #inner-image-wrap { position: relative; height: 95%; max-width: 90%; display: flex; align-items: center; justify-content: center; }
        #scene-image-stage { position: relative; display: flex; align-items: center; justify-content: center; width: fit-content; height: fit-content; max-width: 100%; max-height: 100%; }
        #scene-image { position: relative; z-index: 1; max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 4px; border: 6px solid #f3e5ab; outline: 3px solid #000; box-shadow: 0 0 60px rgba(0,0,0,1); background: #111; }

        /* 對話框與選項 */
        #text-box-container { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 94%; max-width: 1100px; z-index: 30; }
        #text-box { background: var(--textbox-bg); border: 4px solid #8b5a2b; padding: 40px 60px; height: 250px; border-radius: 4px; position: relative; box-shadow: 0 10px 50px rgba(0,0,0,1); }
        #speaker-name { position: absolute; top: -22px; left: 45px; background: #8b5a2b; border: 2px solid #f3e5ab; color: #f3e5ab; padding: 6px 40px; font-weight: bold; font-size: 1.3rem; }
        #dialogue-text { color: #f3e5ab; font-size: 1.65rem; line-height: 1.85; }

        #choice-dim { position: absolute; inset: 0; background: rgba(0,0,0,0.58); backdrop-filter: blur(4px); z-index: 2; display: none; border-radius: 4px; pointer-events: none; }
        #options-container { position: fixed; top: 45%; left: 50%; transform: translate(-50%, -50%); z-index: 50; display: none; flex-direction: column; gap: 20px; width: 550px; }
        .option-btn { background: var(--option-bg); border: 3px solid var(--option-border); padding: 25px; color: #2c1810; font-weight: 900; font-size: 1.6rem; text-align: center; box-shadow: 8px 8px 0px #000; transition: all 0.2s; }
        .option-btn:hover { transform: translate(-5px, -5px); box-shadow: 13px 13px 0px #000; }

        #next-indicator { position: absolute; bottom: 30px; right: 50px; color: #f3e5ab; animation: bounce 0.8s infinite alternate; font-size: 1.8rem; }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(10px); } }

        /* 首頁 */
        #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; display: flex; align-items: center; justify-content: center; transition: opacity 1s; padding: 25px; }
        #start-img-wrap { width: 100%; height: 100%; border: 12px solid #fff; outline: 4px solid #000; position: relative; overflow: hidden; }
        #start-img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.6); }
        .start-btn { position: absolute; bottom: 15%; left: 50%; transform: translateX(-50%); padding: 20px 100px; font-size: 2.8rem; background: #8b5a2b; border: 4px solid #f3e5ab; color: #fff; font-weight: 900; box-shadow: 10px 10px 0 #000; transition: 0.2s; }
        .start-btn:hover { transform: translate(-50%, -15%) scale(1.05); }

        #progress-header { position: fixed; top: 25px; left: 50px; color: rgba(243, 229, 171, 0.4); font-size: 1.3rem; z-index: 30; font-weight: bold; }
    </style>
</head>
<body>
    <div id="progress-header">旅程進度：1 / 10</div>
    
    <div id="start-overlay">
        <div id="start-img-wrap">
            <img id="start-img" src="web-images/IMG_0671.jpg">
            <h1 style="position: absolute; top: 40%; width: 100%; text-align: center; color: #fff; font-size: 5.5rem; letter-spacing: 20px; text-shadow: 5px 5px 0 #000; font-weight: 900;">佛光山：末日流浪</h1>
            <button class="start-btn" onclick="startGame()">START</button>
        </div>
    </div>

    <div id="game-bg"></div>
    <div class="vignette"></div>

    <div id="scene-image-wrap">
        <div id="inner-image-wrap">
            <!-- 左側靜態地圖節點 -->
            <div id="adventure-map-wrap">
                <div class="map-node" data-idx="0"><div class="node-dot"></div><div class="node-text">臺北車站</div></div>
                <div class="map-node" data-idx="3"><div class="node-dot"></div><div class="node-text">臺鐵之旅</div></div>
                <div class="map-node" data-idx="8"><div class="node-dot"></div><div class="node-text">宜蘭坐過站</div></div>
                <div class="map-node" data-idx="10"><div class="node-dot"></div><div class="node-text">計程車父子</div></div>
                <div class="map-node" data-idx="12"><div class="node-dot"></div><div class="node-text">雲起樓門口</div></div>
                <div class="map-node" data-idx="14"><div class="node-dot"></div><div class="node-text">萊爾富生存</div></div>
                <div class="map-node" data-idx="16"><div class="node-dot"></div><div class="node-text">蔬菜學系驚魂</div></div>
                <div class="map-node" data-idx="18"><div class="node-dot"></div><div class="node-text">警衛室絕望</div></div>
                <div class="map-node" data-idx="20"><div class="node-dot"></div><div class="node-text">獲救礁溪站</div></div>
                <div class="map-node" data-idx="21"><div class="node-dot"></div><div class="node-text">回到家門</div></div>
            </div>

            <div id="scene-image-stage">
                <img id="scene-image" alt="劇情圖片">
                <div id="choice-dim"></div>
            </div>
            
            <!-- 右側大型圓鐘 -->
            <div id="adventure-clock-wrap">
                <div id="adventure-clock">
                    <div id="clock-fill"></div>
                </div>
                <div id="clock-label">15:00</div>
            </div>
        </div>
    </div>

    <div id="options-container"></div>

    <div id="text-box-container" onclick="nextAction()">
        <div id="text-box">
            <div id="speaker-name">主角</div>
            <div id="dialogue-text">正在加載旅程...</div>
            <div id="next-indicator">▼</div>
        </div>
    </div>

    <script>
        const scenario = [
            /* 0-1 臺北車站出發 */
            { bg: 'web-images/IMG_0655.jpg', image: 'web-images/IMG_0649.jpg', label: '15:00', dialogues: [
                { speaker: '旁白', text: '老師說，旅行的第一步是設定目標。我的目標其實很模糊，卻也很真誠：追隨隨機性，並且嘗試與陌生人交流。' },
                { speaker: '旁白', text: '這個目標沒有明確路線，卻逼著我不要再照慣性行走。' }
            ], next: 1 },
            { bg: 'web-images/IMG_0655.jpg', image: 'web-images/IMG_0650.jpg', label: '15:20', dialogues: [
                { speaker: '我', text: '出門前我才發現忘了防曬。這一天，我不想只重複平庸的行程。我決定去佛光大學。' }
            ], next: 2 },
            { 
                bg: 'web-images/IMG_0655.jpg', image: 'web-images/IMG_0665.jpg', speaker: '抉擇', text: '第一題：目的地決策', label: '抉擇中',
                options: [
                    { title: '打道回府避暑', next: 'END_HOME' },
                    { title: '前往佛光大學 (宜蘭)', next: 3 }
                ]
            },
            /* 3-4 Q2: 啟程 (地標點: 臺鐵之旅) */
            { bg: 'web-images/IMG_0653.jpg', image: 'web-images/IMG_0661.jpg', label: '16:00', dialogues: [
                { speaker: '我', text: '血液開始沸騰。AI 建議我前往佛大，因為搭臺鐵速度較快。這是具備探險價值的「外縣市處女秀」。' }
            ], next: 4 },
            { 
                bg: 'web-images/IMG_0653.jpg', image: 'web-images/IMG_0657.jpg', speaker: '抉擇', text: '第二題：心態調整', label: '抉擇中',
                options: [ { title: '堅持熱血衝一波', next: 5 }, { title: '買個防曬再走', next: 5 } ]
            },
            /* 5-7 意外 */
            { bg: 'web-images/IMG_0653.jpg', image: 'web-images/IMG_0663.jpg', label: '17:00', dialogues: [
                { speaker: '臺鐵', text: '坐在窗邊，我看著地景慢慢演化。城市褪去，田野浮現。' }
            ], next: 6 },
            { bg: 'web-images/IMG_0653.jpg', image: 'web-images/IMG_0664.jpg', label: '17:40', dialogues: [
                { speaker: '驚醒', text: '糟了！醒來已經到了宜蘭站！我只好補票。感覺這就是 Serendipity。' }
            ], next: 7 },
            { 
                bg: 'web-images/IMG_0653.jpg', image: 'web-images/IMG_0666.jpg', speaker: '抉擇', text: '第三題：意外應對 (宜蘭坐過站)', label: '抉擇中',
                options: [ { title: '將錯就錯下車', next: 8 }, { title: '坐回礁溪', next: 'END_BACK' } ]
            },
            /* 8-9 計程車 */
            { bg: 'web-images/IMG_0664.jpg', image: 'web-images/IMG_0667.jpg', label: '18:15', dialogues: [
                { speaker: '計程車', text: '搭上了車。後座坐著司機下班的兒子。這成了這趟旅程第一個真正的人際接觸。' }
            ], next: 9 },
            { 
                bg: 'web-images/IMG_0664.jpg', image: 'web-images/IMG_0669.jpg', speaker: '抉擇', text: '第四題：交流 (計程車父子)', label: '抉擇中',
                options: [ { title: '婉拒餐盒', next: 10 }, { title: '欣然接受', next: 10 } ]
            },
            /* 10-11 雲起樓 */
            { bg: 'web-images/IMG_0671.jpg', image: 'web-images/IMG_0670.jpg', label: '19:00', dialogues: [
                { speaker: '雲起樓', text: '大樓漆黑無比。走馬燈閃動著疫情告示。這分明就是 Dreamcore 場景。' }
            ], next: 11 },
            { 
                bg: 'web-images/IMG_0674.jpg', image: 'web-images/IMG_0671.jpg', speaker: '抉擇', text: '第五題：校園深度 (雲起樓)', label: '抉擇中',
                options: [ { title: '深入禁區', next: 12 }, { title: '留在原地', next: 12 } ]
            },
            /* 12-13 萊爾富 */
            { bg: 'web-images/IMG_0674.jpg', image: 'web-images/IMG_0681.jpg', label: '19:40', dialogues: [
                { speaker: '生存', text: '沒有餐具。我蹲在走廊邊，對著深淵般的夜色，將米粒倒進嘴裡。' }
            ], next: 13 },
            { 
                bg: 'web-images/IMG_0674.jpg', image: 'web-images/IMG_0680.jpg', speaker: '抉擇', text: '第六題：儀式感 (生存萊爾富)', label: '抉擇中',
                options: [ { title: '以碗就口', next: 14 }, { title: '用手抓', next: 14 } ]
            },
            /* 14-15 驚魂 */
            { bg: 'web-images/IMG_0675.jpg', image: 'web-images/IMG_0679.jpg', label: '20:10', dialogues: [
                { speaker: '驚魂', text: '下山路上叫不到車。我看見那棟陰森不堪的「蔬菜學系」。我的意志力快崩潰。' }
            ], next: 15 },
            { 
                bg: 'web-images/IMG_0675.jpg', image: 'web-images/IMG_0684.jpg', speaker: '抉擇', text: '第七題：崩潰前夕 (蔬菜學系驚魂)', label: '抉擇中',
                options: [ { title: '靠意志力走', next: 16 }, { title: '坐下大哭', next: 16 } ]
            },
            /* 16-17 警衛室 */
            { bg: 'web-images/IMG_0681.jpg', image: 'web-images/IMG_0687.jpg', label: '20:45', dialogues: [
                { speaker: '孤絕', text: '最後一班校車已走。我握緊手機跟電力，嘗試發出最後的救援訊源。' }
            ], next: 17 },
            { 
                bg: 'web-images/IMG_0687.jpg', image: 'IMG_0696.PNG', speaker: '抉擇', text: '第八題：告求 (警衛室)', label: '抉擇中',
                options: [ { title: '瞞著媽媽', next: 18 }, { title: '誠實求援', next: 18 } ]
            },
            /* 18-19 礁溪獲救 */
            { bg: 'web-images/IMG_0703.jpg', image: 'web-images/IMG_0701.jpg', label: '21:30', dialogues: [
                { speaker: '救命', text: '兩道白色燈光出現了。那是計程車。21:44 我終於登上了自強號。' }
            ], next: 19 },
            { 
                bg: 'web-images/IMG_0703.jpg', image: 'web-images/IMG_0688.jpg', speaker: '抉擇', text: '第九題：總結 (獲救成功)', label: '抉擇中',
                options: [ { title: '確保安全意識', next: 20 }, { title: '以後去爬山', next: 20 } ]
            },
            /* 20-21 心得總結 */
            { 
                bg: 'web-images/IMG_0701.jpg', image: 'web-images/IMG_0688.jpg', speaker: '抉擇', text: '第十題：心得定調 (回到家門)', label: '抉擇中',
                options: [ { title: '隨機與準備並存', next: 21 }, { title: '遠離山區', next: 21 } ]
            },
            { bg: 'web-images/IMG_0701.jpg', image: 'web-images/IMG_0687.jpg', label: '00:00', dialogues: [
                { speaker: '終章', text: '這 9 小時讓我明白，這是我這輩子最重要的作業。' }
            ], next: 'END' }
        ];

        let currentIndex = 0;
        let currentDialogueIndex = 0;
        let isTyping = false;

        function startGame() {
            document.getElementById('start-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('start-overlay').style.display = 'none';
                updateFrame();
            }, 1000);
        }

        function updateFrame() {
            const current = scenario[currentIndex];
            const bg = document.getElementById('game-bg');
            const sceneImageWrap = document.getElementById('scene-image-wrap');
            const sceneImage = document.getElementById('scene-image');
            const choiceDim = document.getElementById('choice-dim');
            const clockFill = document.getElementById('clock-fill');
            const clockLabel = document.getElementById('clock-label');
            
            bg.style.backgroundImage = `url('${current.bg}')`;
            if (current.image) {
                sceneImage.src = current.image;
                sceneImageWrap.style.display = 'flex';
            } else {
                sceneImageWrap.style.display = 'none';
            }
            
            // 更新時鐘
            const percent = ((currentIndex + 1) / scenario.length) * 100;
            let clockColor = '#f3e5ab';
            if (percent > 40) clockColor = '#ff8c00';
            if (percent > 75) clockColor = '#9370db';
            document.documentElement.style.setProperty('--clock-color', clockColor);
            clockFill.style.background = `conic-gradient(${clockColor} ${percent}%, transparent 0%)`;
            clockLabel.innerText = current.label;

            // 更新地圖節點
            document.querySelectorAll('.map-node').forEach(node => {
                const nodeIdx = parseInt(node.getAttribute('data-idx'));
                node.classList.remove('active', 'past');
                if (nodeIdx === currentIndex) node.classList.add('active');
                else if (nodeIdx < currentIndex) node.classList.add('past');
                // 處理中間沒標註的地點邏輯 (稍微粗略但有效)
                if (currentIndex > nodeIdx) node.classList.add('past');
            });

            document.getElementById('progress-header').innerText = `旅程進度：${currentIndex + 1} / ${scenario.length}`;
            currentDialogueIndex = 0;
            renderDialogue();
            
            document.getElementById('options-container').style.display = 'none';
            choiceDim.style.display = 'none';
        }

        function getDialogueEntry(scene) {
            if (scene.dialogues) return scene.dialogues[currentDialogueIndex];
            return { speaker: scene.speaker, text: scene.text };
        }

        function renderDialogue() {
            const current = scenario[currentIndex];
            const dialogue = getDialogueEntry(current);
            document.getElementById('speaker-name').innerText = dialogue.speaker;
            typeEffect(dialogue.text);
        }

        function typeEffect(text) {
            const dialog = document.getElementById('dialogue-text');
            dialog.innerText = '';
            isTyping = true;
            let i = 0;
            const timer = setInterval(() => {
                dialog.innerText += text[i];
                i++;
                if (i >= text.length) { clearInterval(timer); isTyping = false; checkShowOptions(); }
            }, 25);
        }

        function checkShowOptions() {
            const current = scenario[currentIndex];
            if (current.options) {
                const optContainer = document.getElementById('options-container');
                const choiceDim = document.getElementById('choice-dim');
                optContainer.innerHTML = '';
                current.options.forEach(opt => {
                    const btn = document.createElement('div');
                    btn.className = 'option-btn';
                    btn.innerText = opt.title;
                    btn.onclick = (e) => { e.stopPropagation(); handleOption(opt.next); };
                    optContainer.appendChild(btn);
                });
                choiceDim.style.display = 'block';
                optContainer.style.display = 'flex';
                document.getElementById('next-indicator').style.display = 'none';
            } else {
                document.getElementById('next-indicator').style.display = 'block';
            }
        }

        function handleOption(nextId) {
            if (nextId.startsWith('END')) { alert('報告順利完成！'); location.reload(); return; }
            currentIndex = nextId;
            updateFrame();
        }

        function nextAction() {
            if (isTyping) return;
            const current = scenario[currentIndex];
            if (current.dialogues && currentDialogueIndex < current.dialogues.length - 1) {
                currentDialogueIndex++;
                renderDialogue();
                return;
            }
            if (current.options) return; 
            if (current.next === 'END') { alert('感謝聆聽這場驚心動魄的冒險！'); location.reload(); }
            else { currentIndex = current.next; updateFrame(); }
        }
    </script>
</body>
</html>
