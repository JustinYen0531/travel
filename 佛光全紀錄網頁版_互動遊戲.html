<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>佛光山探險：視覺小說冒險（視覺大師版）</title>
    <style>
        :root {
            --textbox-bg: rgba(22, 14, 10, 0.96);
            --option-bg: linear-gradient(180deg, #c08d51 0%, #633c1a 100%);
            --option-border: #f3e5ab;
            --accent: #f472b6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: pointer; user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: "Noto Sans TC", sans-serif; }

        /* 首頁樣式 */
        #start-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1.2s;
        }

        #start-image-container {
            width: calc(100% - 60px);
            height: calc(100% - 60px);
            border: 6px solid #fff;
            outline: 3px solid #000;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 60px rgba(0,0,0,0.9);
        }

        #start-bg-img {
            width: 100%; height: 100%;
            object-fit: cover;
            filter: brightness(0.8) contrast(1.1);
        }

        #start-title-wrap {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 80%;
        }

        .start-btn {
            margin-top: 50px;
            padding: 20px 100px;
            background: #633c1a;
            border: 3px solid #f3e5ab;
            color: #f3e5ab;
            font-size: 2.2rem;
            border-radius: 4px;
            font-weight: 900;
            transition: all 0.2s;
            box-shadow: 8px 8px 0px #000;
        }
        .start-btn:hover { background: #c08d51; transform: translate(-4px, -4px); box-shadow: 12px 12px 0px #000; }

        /* 遊戲內核心佈局 */
        #game-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            transition: opacity 1s;
            z-index: 1;
        }

        .vignette {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.85) 100%);
            z-index: 2;
            pointer-events: none;
        }

        /* 劇情圖片容器 - 修正比例與間距 */
        #scene-image-wrap {
            position: fixed;
            left: 50%;
            top: 6vh; /* 頂部間距 */
            transform: translateX(-50%);
            width: 85%;
            max-width: 960px;
            height: 48vh; /* 限制高度，騰出下方空間 */
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9;
            pointer-events: none;
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
            padding: 15px;
            border: 2px solid rgba(243, 229, 171, 0.2);
            backdrop-filter: blur(5px);
        }

        #scene-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 10px;
            border: 4px solid #f3e5ab;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }

        /* 選項出現時背景變暗 */
        #choice-dim {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            z-index: 15;
            display: none;
        }

        /* 對話框 - 提高精緻度 */
        #text-box-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 94%;
            max-width: 1200px;
            z-index: 12;
        }

        #text-box {
            background: var(--textbox-bg);
            border: 3px solid #633c1a;
            outline: 2px solid #000;
            border-radius: 8px;
            padding: 35px 60px;
            min-height: 200px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.9);
            position: relative;
        }

        #speaker-name {
            position: absolute;
            top: -24px;
            left: 50px;
            background: #633c1a;
            padding: 6px 40px;
            border: 2px solid #f3e5ab;
            color: #f3e5ab;
            font-weight: bold;
            font-size: 1.3rem;
            border-radius: 4px;
        }

        #dialogue-text {
            color: #f3e5ab;
            font-size: 1.55rem;
            line-height: 1.8;
            margin-top: 10px;
        }

        /* 選項按鈕 - 居中且震撼 */
        #options-container {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            display: none;
            flex-direction: column;
            gap: 25px;
            width: 550px;
        }

        .option-btn {
            background: var(--option-bg);
            border: 2px solid var(--option-border);
            border-radius: 4px;
            padding: 22px 40px;
            color: #2c1810;
            font-weight: 900;
            font-size: 1.5rem;
            text-align: center;
            box-shadow: 0 8px 25px rgba(0,0,0,0.7);
            transition: all 0.15s;
        }
        .option-btn:hover { border-color: #fff; transform: scale(1.05); filter: contrast(1.2); }

        #next-indicator {
            position: absolute;
            bottom: 25px; right: 40px;
            color: #f3e5ab; opacity: 0.7;
            animation: bounce 0.8s infinite alternate;
        }

        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(10px); } }

        #progress {
            position: fixed;
            top: 20px; right: 40px;
            color: rgba(243, 229, 171, 0.4);
            font-size: 1.2rem;
            z-index: 30;
        }
    </style>
</head>
<body>
    <div id="progress">冒險進度：1 / 10</div>
    
    <div id="start-overlay">
        <div id="start-image-container">
            <img id="start-bg-img" src="web-images/IMG_0671.jpg">
            <div id="start-title-wrap">
                <h1 style="font-size: 4.5rem; color: #fff; text-shadow: 4px 4px 0 #000; letter-spacing: 12px;">佛光山：末日流浪</h1>
                <button class="start-btn" onclick="startGame()">START ADVENTURE</button>
            </div>
        </div>
    </div>

    <div id="game-bg"></div>
    <div class="vignette"></div>
    <div id="choice-dim"></div>
    
    <!-- 修正間距後的圖片區域 -->
    <div id="scene-image-wrap">
        <img id="scene-image" alt="劇情圖片">
    </div>

    <div id="options-container"></div>

    <div id="text-box-container" onclick="nextAction()">
        <div id="text-box">
            <div id="speaker-name">主角</div>
            <div id="dialogue-text">...</div>
            <div id="next-indicator">▼</div>
        </div>
    </div>

    <script>
        const scenario = [
            { bg: 'web-images/IMG_0655.jpg', image: 'web-images/IMG_0649.jpg', dialogues: [
                { speaker: '旁白', text: '老師說，旅行的第一步是設定目標。我的目標其實很模糊，卻也很真誠：追隨隨機性，並且嘗試與陌生人交流。' },
                { speaker: '旁白', text: '這個目標沒有明確路線，卻逼著我不要再照慣性行走，而是把自己放進一個真正可能遇到陌生人的地方。' }
            ], next: 1 },
            { bg: 'web-images/IMG_0655.jpg', image: 'web-images/IMG_0650.jpg', dialogues: [
                { speaker: '我', text: '出門前我才發現忘了防曬。這一天，我不想只重複平庸的行程。我決定去一個這輩子可能再也去不到的地方：佛光大學。' },
                { speaker: '我', text: '它在宜蘭山頂，甚至因為大環境因素面臨停辦。幾乎沒有人會獨自前往，這反而讓它更像我真正該去的目的地。' }
            ], next: 2 },
            { 
                bg: 'web-images/IMG_0655.jpg', image: 'web-images/IMG_0665.jpg', speaker: '抉擇', text: '第一題：目的地選擇', 
                options: [
                    { title: '打道回府避暑', next: 'END_HOME' },
                    { title: '前往佛光大學 (宜蘭)', next: 3 }
                ]
            },
            { bg: 'web-images/IMG_0653.jpg', image: 'web-images/IMG_0661.jpg', dialogues: [
                { speaker: '我', text: '血液開始沸騰。AI 建議我前往佛大，因為搭臺鐵速度較快。這是一場具備探險價值的「外縣市處女秀」。' },
                { speaker: '我', text: '我幾乎從未獨自前往外縣市，而這次只因為交通動線更直接、約一個半小時可抵達礁溪，就決定把熱血押在佛大身上。' }
            ], next: 4 },
            { 
                bg: 'web-images/IMG_0653.jpg', image: 'web-images/IMG_0657.jpg', speaker: '抉擇', text: '第二題：心態調整', 
                options: [
                    { title: '堅持熱血衝一波', next: 5 },
                    { title: '買個防曬再走', next: 5 }
                ]
            },
            { bg: 'web-images/IMG_0653.jpg', image: 'web-images/IMG_0663.jpg', dialogues: [
                { speaker: '臺鐵', text: '坐在窗邊，我看著地景慢慢演化。城市褪去，田野浮現。這種體察讓我感到前所未有的「脫隊感」。' },
                { speaker: '臺鐵', text: '窗外先是密集建築，再來是工廠與田野交錯，最後綠意慢慢覆蓋一切。老師說的 relaxed, see what happens，大概就是這種感覺。' }
            ], next: 6 },
            { bg: 'web-images/IMG_0653.jpg', image: 'web-images/IMG_0664.jpg', dialogues: [
                { speaker: '驚醒', text: '糟了！醒來已經到了宜蘭站！我只好補了十一元票差。感覺這就是 Serendipity 正在對我招手。' },
                { speaker: '驚醒', text: '我慌亂地走向詢問處補票，走出站後 AI 還安慰我說宜蘭也算順路。這個意外沒有毀掉旅程，反而把它推向更真實的方向。' }
            ], next: 7 },
            { 
                bg: 'web-images/IMG_0653.jpg', image: 'web-images/IMG_0666.jpg', speaker: '抉擇', text: '第三題：路上的波折', 
                options: [
                    { title: '將錯就錯下車', next: 8 },
                    { title: '沮喪地坐回去', next: 'END_BACK' }
                ]
            },
            { bg: 'web-images/IMG_0664.jpg', image: 'web-images/IMG_0667.jpg', dialogues: [
                { speaker: '計程車', text: '我搭上了車。後座坐著司機下班的兒子。這成了這趟旅程第一個真正的人際接觸。' },
                { speaker: '計程車', text: '他一路追問我是不是放假、為什麼現在才上山。我最後坦承自己根本不是佛光學生，只是來做探索作業，司機父子才露出「原來如此」的笑。' }
            ], next: 9 },
            { 
                bg: 'web-images/IMG_0664.jpg', image: 'web-images/IMG_0669.jpg', speaker: '抉擇', text: '第四題：人際交流', 
                options: [
                    { title: '婉拒餐盒 (期待校內餐廳)', next: 10 },
                    { title: '欣然接受溫暖', next: 10 }
                ]
            },
            { bg: 'web-images/IMG_0671.jpg', image: 'web-images/IMG_0670.jpg', dialogues: [
                { speaker: '雲起樓', text: '山頂行政大樓「雲起樓」漆黑無比。走馬燈閃動著疫情告示。這分明就是 Dreamcore 的真實場景。' },
                { speaker: '雲起樓', text: '媽媽剛好打電話來，她原本以為我在象山。當我說自己在佛光大學時，她根本不信，直到我拍下印著校名的車子傳給她。' }
            ], next: 11 },
            { 
                bg: 'web-images/IMG_0674.jpg', image: 'web-images/IMG_0671.jpg', speaker: '抉擇', text: '第五題：校園探險', 
                options: [
                    { title: '深入禁區探索', next: 12 },
                    { title: '留在萊爾富周邊', next: 12 }
                ]
            },
            { bg: 'web-images/IMG_0674.jpg', image: 'web-images/IMG_0681.jpg', dialogues: [
                { speaker: '生存', text: '這裡沒有餐具。我蹲在走廊邊，對著蘭陽平原深淵般的夜色，將米粒倒進嘴裡。' },
                { speaker: '生存', text: '我原本以為校園內一定有餐廳，結果整棟樓只剩萊爾富，而且加熱食品幾乎售罄，只剩一份冷凍炒飯。連餐具也沒有，逼得我只能以碗就口。' }
            ], next: 13 },
            { 
                bg: 'web-images/IMG_0674.jpg', image: 'web-images/IMG_0680.jpg', speaker: '抉擇', text: '第六題：生存方式', 
                options: [
                    { title: '以碗就口倒進嘴裡', next: 14 },
                    { title: '用手抓著吃', next: 14 }
                ]
            },
            { bg: 'web-images/IMG_0675.jpg', image: 'web-images/IMG_0679.jpg', dialogues: [
                { speaker: '下山驚魂', text: '晚上八點。叫不到車。我看見那棟陰森不堪的「蔬菜學系」。我想起母親焦急的電話，那種壓迫感快讓我崩潰。' },
                { speaker: '下山驚魂', text: '我用 55688 加了優先小費，卻還是沒有司機願意進山。月光下那棟樓斑駁得像鬼片場景，我甚至還幾度走進死胡同。' }
            ], next: 15 },
            { 
                bg: 'web-images/IMG_0675.jpg', image: 'web-images/IMG_0684.jpg', speaker: '抉擇', text: '第七題：意志與恐懼', 
                options: [
                    { title: '靠意志力繼續走', next: 16 },
                    { title: '停下來哭泣', next: 16 }
                ]
            },
            { bg: 'web-images/IMG_0681.jpg', image: 'web-images/IMG_0687.jpg', dialogues: [
                { speaker: '孤絕', text: '最後一班校車已走。我握緊手機跟僅存的電力，對著黑暗的山區嘗試發出最後的救援訊源。' },
                { speaker: '孤絕', text: '警衛室裡的人告訴我，末班校車八點半就離開了。那一刻我才真正意識到，浪漫探險和危險流浪之間只有一道很薄的線。' }
            ], next: 17 },
            { 
                bg: 'web-images/IMG_0687.jpg', image: 'IMG_0695.PNG', speaker: '抉擇', text: '第八題：告求', 
                options: [
                    { title: '瞞著媽媽假裝安全', next: 18 },
                    { title: '誠實求援', next: 18 }
                ]
            },
            { bg: 'web-images/IMG_0703.jpg', image: 'web-images/IMG_0701.jpg', dialogues: [
                { speaker: '救命', text: '兩道白色燈光出現了。那輛計程車是我今晚看過最美的風景。21:44 我終於登上了自強號。' },
                { speaker: '救命', text: '23:30 我回到臺北車站，午夜十二點才踏進家門。熟悉的城市燈光重新包住我，也讓這場流浪終於有了平安的結尾。' }
            ], next: 19 },
            { 
                bg: 'web-images/IMG_0703.jpg', image: 'web-images/IMG_0688.jpg', speaker: '抉擇', text: '第九題：結論', 
                options: [
                    { title: '確保安全意識', next: 20 },
                    { title: '以後只爬象山', next: 20 }
                ]
            },
            { bg: 'web-images/IMG_0701.jpg', speaker: '結語', text: '這 9 小時的流浪讓我明白，真正的探險不在於攻略，而是那一股如何回家、如何與人連結的意志力。這是我這輩子最重要的作業。', next: 'END' }
        ];

        let currentIndex = 0;
        let currentDialogueIndex = 0;
        let isTyping = false;
        let qCount = 1;

        function startGame() {
            document.getElementById('start-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('start-overlay').style.display = 'none';
                updateFrame();
            }, 1200);
        }

        function updateFrame() {
            const current = scenario[currentIndex];
            const bg = document.getElementById('game-bg');
            const sceneImageWrap = document.getElementById('scene-image-wrap');
            const sceneImage = document.getElementById('scene-image');
            const choiceDim = document.getElementById('choice-dim');
            
            bg.style.backgroundImage = `url('${current.bg}')`;

            if (current.image) {
                sceneImage.src = current.image;
                sceneImageWrap.style.display = 'flex';
            } else {
                sceneImageWrap.style.display = 'none';
            }
            
            document.getElementById('progress').innerText = `冒險進度：${currentIndex + 1} / ${scenario.length}`;
            currentDialogueIndex = 0;
            renderDialogue();
            
            document.getElementById('options-container').style.display = 'none';
            choiceDim.style.display = 'none';
        }

        function getDialogueEntry(scene) {
            if (scene.dialogues) {
                return scene.dialogues[currentDialogueIndex];
            }
            return { speaker: scene.speaker, text: scene.text };
        }

        function renderDialogue() {
            const current = scenario[currentIndex];
            const dialogue = getDialogueEntry(current);
            document.getElementById('speaker-name').innerText = dialogue.speaker;
            typeEffect(dialogue.text);
        }

        function typeEffect(text) {
            const dialog = document.getElementById('dialogue-text');
            dialog.innerText = '';
            isTyping = true;
            let i = 0;
            const timer = setInterval(() => {
                dialog.innerText += text[i];
                i++;
                if (i >= text.length) {
                    clearInterval(timer);
                    isTyping = false;
                    checkShowOptions();
                }
            }, 30);
        }

        function checkShowOptions() {
            const current = scenario[currentIndex];
            if (current.options) {
                const optContainer = document.getElementById('options-container');
                const choiceDim = document.getElementById('choice-dim');
                optContainer.innerHTML = '';
                current.options.forEach(opt => {
                    const btn = document.createElement('div');
                    btn.className = 'option-btn';
                    btn.innerText = opt.title;
                    btn.onclick = (e) => { e.stopPropagation(); handleOption(opt.next); };
                    optContainer.appendChild(btn);
                });
                choiceDim.style.display = 'block';
                optContainer.style.display = 'flex';
                document.getElementById('next-indicator').style.display = 'none';
            } else {
                document.getElementById('next-indicator').style.display = 'block';
            }
        }

        function handleOption(nextId) {
            if (nextId === 'END_HOME' || nextId === 'END_BACK') { alert('探索結束。'); location.reload(); return; }
            currentIndex = nextId;
            updateFrame();
        }

        function nextAction() {
            if (isTyping) return;
            const current = scenario[currentIndex];
            if (current.dialogues && currentDialogueIndex < current.dialogues.length - 1) {
                currentDialogueIndex++;
                renderDialogue();
                return;
            }
            if (current.options) return; 
            if (current.next === 'END') {
                alert('報告完成，感謝聆聽這段流浪記。');
                location.reload();
            } else {
                currentIndex = current.next;
                updateFrame();
            }
        }
    </script>
</body>
</html>
